# ⚠️  LEGACY — ne pas utiliser comme stack locale par défaut. Source de vérité :
#    docker-compose.arquantix-recovery.yml + COMPOSE_PROJECT_NAME=arquantixrecovery (.env.arquantix).
#    Ce fichier reste pour référence / certains teardowns (voir scripts/dev-reset.sh) ; ne pas lancer
#    un « up » ici si la politique repo est uniquement recovery.
# Pas de container_name : les noms générés par Compose (projet_service_…) évitent les conflits
# d’état fantôme avec le moteur Docker tout en conservant la résolution DNS par nom de service
# (arquantix-db, arquantix-api, …). Préférer : docker compose exec <service> …
services:
  # PostgreSQL Database
  arquantix-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-arquantix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arquantix}
      POSTGRES_DB: ${DB_NAME:-arquantix}
    ports:
      - "${DB_PORT:-5443}:5432"
    volumes:
      - arquantix-db-data:/var/lib/postgresql/data
      # Nouveaux volumes : autorise le réseau Docker (évite pg_hba tronqué = seulement localhost)
      - ./services/arquantix/db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arquantix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arquantix-network

  # FastAPI Arquantix (auth, custody, mobile, PDF / WeasyPrint) — mode local par défaut.
  # Image = services/arquantix/api/Dockerfile (libs natives pour WeasyPrint). templates/pdf inclus via COPY . .
  arquantix-api:
    build:
      context: ./services/arquantix/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env.arquantix
    environment:
      DATABASE_URL: postgresql://${DB_USER:-arquantix}:${DB_PASSWORD:-arquantix}@arquantix-db:5432/${DB_NAME:-arquantix}
      REDIS_URL: redis://arquantix-redis:6379/0
      AUTH_REDIS_URL: redis://arquantix-redis:6379/0
    depends_on:
      arquantix-db:
        condition: service_healthy
      arquantix-redis:
        condition: service_healthy
    networks:
      - arquantix-network
    restart: unless-stopped

  # Strapi (arquantix-cms) retiré — même stack que recovery ; cf. docker-compose.arquantix-recovery.yml.

  # Next.js Site Vitrine
  arquantix-web:
    build:
      context: ./services/arquantix/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
        NEXT_PUBLIC_ADMIN_LOGIN0_BG_VIDEO: ${NEXT_PUBLIC_ADMIN_LOGIN0_BG_VIDEO:-}
    # BFF serveur → FastAPI : service arquantix-api sur le réseau compose (défaut).
    # extra_hosts utile si BACKEND_URL pointe vers l’hôte (ex. API uvicorn local).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Charge les variables du .env à la racine du repo (ex. ADMIN_LOGIN0_BG_VIDEO) ;
    # les clés ci-dessous écrasent en cas de doublon.
    # Médias (Prisma, R2) : R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME
    # doivent être dans ce .env racine — sinon upload médias et GET /api/admin/media/*/file répondent 503.
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Aligné sur l’API (auth.py) : même secret que .env.arquantix pour les JWT BFF (custody, proxy admin).
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      # Prisma (routes /api/admin/*) : accès depuis le conteneur vers Postgres du compose
      DATABASE_URL: postgresql://${DB_USER:-arquantix}:${DB_PASSWORD:-arquantix}@arquantix-db:5432/${DB_NAME:-arquantix}
      # Serveur uniquement : proxy BFF → FastAPI (prioritaire sur NEXT_PUBLIC_* dans getBackendBaseUrl).
      BACKEND_URL: ${BACKEND_URL:-http://arquantix-api:8000}
      # Routes API Next (server) — résolution via getBackendBaseUrl() (priorité BACKEND_API_URL → …)
      BACKEND_API_URL: ${BACKEND_API_URL:-http://arquantix-api:8000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://arquantix-api:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
      # Vidéo fond /admin/login0 — lu au runtime (pas besoin de rebuild si tu utilises ADMIN_LOGIN0_BG_VIDEO)
      ADMIN_LOGIN0_BG_VIDEO: ${ADMIN_LOGIN0_BG_VIDEO:-}
      NEXT_PUBLIC_ADMIN_LOGIN0_BG_VIDEO: ${NEXT_PUBLIC_ADMIN_LOGIN0_BG_VIDEO:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./services/arquantix/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      arquantix-api:
        condition: service_started
    networks:
      - arquantix-network
    restart: unless-stopped

  # Redis (alerts cache, future task queue)
  arquantix-redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - arquantix-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arquantix-network

# Noms fixes : le même volume Postgres/Redis est réutilisé quel que soit COMPOSE_PROJECT_NAME
# (évite une « nouvelle base vide » à chaque nouveau nom de projet).
volumes:
  arquantix-db-data:
    name: arquantix_arquantix-db-data
  arquantix-redis-data:
    name: arquantix_arquantix-redis-data

networks:
  arquantix-network:
    name: arquantix_arquantix-network
    driver: bridge

