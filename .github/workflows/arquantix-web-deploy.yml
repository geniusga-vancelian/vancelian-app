name: Arquantix Web - Deploy to ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/arquantix/web/**"
      - ".github/workflows/arquantix-web-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: me-central-1
  ECR_REGISTRY: 411714852748.dkr.ecr.me-central-1.amazonaws.com
  ECR_REPOSITORY: arquantix-web
  IMAGE_TAG: ${{ inputs.tag || 'latest' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-arquantix-web-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker image
        run: |
          set -euo pipefail
          echo "🔨 Building Docker image..."
          echo "   Repository: ${{ env.ECR_REPOSITORY }}"
          echo "   Tag: ${{ env.IMAGE_TAG }}"
          echo "   Context: services/arquantix/web"
          
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -f services/arquantix/web/Dockerfile \
            services/arquantix/web
      
      - name: Push Docker image to ECR
        run: |
          set -euo pipefail
          echo "📤 Pushing image to ECR..."
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          echo "✅ Image pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
      
      - name: Verify image in ECR
        run: |
          set -euo pipefail
          echo "🔍 Verifying image in ECR..."
          aws ecr describe-images \
            --region ${{ env.AWS_REGION }} \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --query 'imageDetails[0].{digest:imageDigest,pushedAt:imagePushedAt}' \
            --output json || echo "⚠️  Image not found in ECR (may need to create repository first)"
      
      # Note: ECS deployment step can be added here if ECS service is configured
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster arquantix-cluster \
      #       --service arquantix-web \
      #       --force-new-deployment \
      #       --region ${{ env.AWS_REGION }}

