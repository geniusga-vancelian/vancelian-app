# Production ECS + ECR: us-east-1 (Arquantix cluster).
name: Arquantix Web - Deploy to ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/arquantix/web/**"
      - "services/arquantix/mobile/assets/crypto_svgs/**"
      - ".github/workflows/arquantix-web-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 411714852748.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: arquantix-web
  ECS_CLUSTER: arquantix-cluster
  ECS_SERVICE: arquantix-web
  ECS_TASKDEF_FAMILY: arquantix-web
  IMAGE_TAG: ${{ inputs.tag || github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-arquantix-web-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build & push Docker image
        run: |
          set -euo pipefail
          echo "Building arquantix-web image..."
          echo "  Repository: ${{ env.ECR_REPOSITORY }}"
          echo "  Tag:        ${{ env.IMAGE_TAG }}"
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=https://api.arquantix.com \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://api.arquantix.com \
            --build-arg NEXT_PUBLIC_SITE_URL=https://arquantix.com \
            --build-arg NEXT_PUBLIC_GIT_SHA=${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            -f services/arquantix/web/Dockerfile \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Render new task definition with updated image
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASKDEF_FAMILY }}
          container-name: arquantix-web
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          # RDS prod peut déclencher P3005 au migrate deploy (schéma existant sans historique aligné).
          # Les migrations doivent être baseline/résolues séparément ; le web ne doit pas bloquer le démarrage.
          environment-variables: |
            RUN_PRISMA_MIGRATE_ON_START=0

      # amazon-ecs-render-task-definition ne supprime pas un `command` déjà présent sur
      # la task definition AWS ; sans cette étape le contournement manuel (next-only)
      # survivrait à tous les déploiements. Après fusion du Dockerfile (CMD conditionnel),
      # on revient au CMD image + variable d’environnement ci‑dessus.
      - name: Retirer le override command ECS (CMD de l'image)
        run: |
          set -euo pipefail
          TD="${{ steps.render-taskdef.outputs.task-definition }}"
          jq '
            .containerDefinitions |= map(
              if .name == "arquantix-web" then del(.command) else . end
            )
          ' "$TD" > "${TD}.tmp" && mv "${TD}.tmp" "$TD"

      - name: Deploy to ECS (force-new-deployment + wait stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

