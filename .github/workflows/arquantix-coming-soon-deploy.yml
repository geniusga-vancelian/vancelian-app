name: Arquantix Coming Soon - Deploy to ECR & ECS

on:
  push:
    branches: [ "main", "arquantix-coming-soon" ]
    paths:
      - "services/arquantix/web/**"
      - "services/arquantix/mobile/assets/crypto_svgs/**"
      - ".github/workflows/arquantix-coming-soon-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: me-central-1
  ECR_REGISTRY: 411714852748.dkr.ecr.me-central-1.amazonaws.com
  ECR_REPOSITORY: arquantix-coming-soon
  ECS_CLUSTER: arquantix-cluster
  ECS_SERVICE: arquantix-coming-soon

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-arquantix-coming-soon-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build Docker image
        run: |
          set -euo pipefail
          echo "🔨 Building Docker image..."
          echo "   Repository: ${{ env.ECR_REPOSITORY }}"
          echo "   Tag: ${{ steps.set-tag.outputs.tag }}"
          echo "   Context: monorepo root"
          echo "   Git SHA: ${{ github.sha }}"
          
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_GIT_SHA=${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }} \
            -f services/arquantix/web/Dockerfile \
            .
      
      - name: Push Docker image to ECR
        run: |
          set -euo pipefail
          echo "📤 Pushing image to ECR..."
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          echo "✅ Image pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}"
      
      - name: Verify image in ECR
        id: verify-image
        run: |
          set -euo pipefail
          echo "🔍 Verifying image in ECR..."
          IMAGE_DIGEST=$(aws ecr describe-images \
            --region ${{ env.AWS_REGION }} \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.set-tag.outputs.tag }} \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>&1)
          
          if [ "$IMAGE_DIGEST" = "None" ] || [ -z "$IMAGE_DIGEST" ]; then
            echo "❌ Error: Image with tag ${{ steps.set-tag.outputs.tag }} not found in ECR"
            exit 1
          fi
          
          echo "✅ Image verified: $IMAGE_DIGEST"
          echo "digest=$IMAGE_DIGEST" >> $GITHUB_OUTPUT
      
      - name: Fetch current task definition
        id: fetch-taskdef
        run: |
          set -euo pipefail
          echo "📥 Fetching current task definition..."
          
          # Try to get current task definition from service
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "services[0].taskDefinition" \
            --output text 2>/dev/null || echo "")
          
          if [ -n "$CURRENT_TASK_DEF" ] && [ "$CURRENT_TASK_DEF" != "None" ]; then
            echo "📋 Found existing task definition: $CURRENT_TASK_DEF"
            aws ecs describe-task-definition \
              --task-definition "$CURRENT_TASK_DEF" \
              --region "${{ env.AWS_REGION }}" \
              --query "taskDefinition" \
              --output json > taskdef.json
            
            # ECS does not accept null values for some optional fields. Strip them
            # using jq (pre-installed on ubuntu-latest). We only touch the keys
            # that have caused issues in the past (taskRoleArn, proxyConfiguration);
            # other fields are preserved verbatim so the task definition stays valid.
            jq '
              if .taskRoleArn == null then del(.taskRoleArn) else . end
              | if .proxyConfiguration == null then del(.proxyConfiguration) else . end
            ' taskdef.json > taskdef.cleaned.json
            mv taskdef.cleaned.json taskdef.json
            python3 -m json.tool taskdef.json >/dev/null
            echo "✅ Task definition cleaned and validated"
          else
            echo "📋 No existing task definition found, using template"
            cp services/arquantix/.aws/task-definition.json taskdef.json
          fi
      
      - name: Verify task definition before render
        run: |
          echo "🔍 Verifying task definition JSON..."
          python3 -m json.tool taskdef.json > /dev/null && echo "✅ JSON is valid" || (echo "❌ Invalid JSON" && exit 1)
          echo "📋 Task definition preview:"
          python3 -c "import json; td = json.load(open('taskdef.json')); print(f\"  Family: {td.get('family')}\"); print(f\"  Container: {td['containerDefinitions'][0]['name']}\"); print(f\"  ExecutionRole: {td.get('executionRoleArn', 'N/A')[:50]}...\")"
      
      - name: Render new task definition with new image
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: arquantix-coming-soon
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
      
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
