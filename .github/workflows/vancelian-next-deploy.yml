name: Vancelian Next - Deploy to ECS

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/arquantix/web/**"
      - "services/arquantix/mobile/assets/crypto_svgs/**"
      - ".github/workflows/vancelian-next-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 411714852748.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: vancelian-next
  ECS_CLUSTER: arquantix-cluster
  ECS_SERVICE: vancelian-next
  ECS_TASKDEF_FAMILY: vancelian-next
  IMAGE_TAG: ${{ inputs.tag || github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-vancelian-next-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve Base RPC URL for client bundle
        run: |
          set -euo pipefail
          RPC="${{ secrets.VANCELIAN_BASE_RPC_URL }}"
          if [ -z "${RPC:-}" ]; then
            if RPC=$(aws secretsmanager get-secret-value \
              --secret-id arquantix/prod/base-rpc-url-primary \
              --query SecretString --output text 2>/dev/null); then
              echo "Base RPC résolu depuis Secrets Manager (arquantix/prod/base-rpc-url-primary)"
            else
              echo "::error::VANCELIAN_BASE_RPC_URL absent et secret SM introuvable — build client Base RPC impossible."
              exit 1
            fi
          else
            echo "Base RPC résolu depuis GitHub secret VANCELIAN_BASE_RPC_URL"
          fi
          if echo "$RPC" | grep -q 'mainnet.base.org'; then
            echo "::error::NEXT_PUBLIC_BASE_RPC_URL ne doit pas utiliser mainnet.base.org en primary prod."
            exit 1
          fi
          echo "NEXT_PUBLIC_BASE_RPC_URL=$RPC" >> "$GITHUB_ENV"

      - name: Resolve WalletConnect Project ID for client bundle
        run: |
          set -euo pipefail
          WC="${{ secrets.VANCELIAN_WALLETCONNECT_PROJECT_ID }}"
          if [ -z "${WC:-}" ]; then
            if WC=$(aws secretsmanager get-secret-value \
              --secret-id arquantix/prod/walletconnect-project-id \
              --query SecretString --output text 2>/dev/null); then
              echo "WalletConnect Project ID résolu depuis Secrets Manager (arquantix/prod/walletconnect-project-id)"
            else
              echo "::error::VANCELIAN_WALLETCONNECT_PROJECT_ID absent et secret SM introuvable — build client WalletConnect impossible."
              exit 1
            fi
          else
            echo "WalletConnect Project ID résolu depuis GitHub secret VANCELIAN_WALLETCONNECT_PROJECT_ID"
          fi
          echo "NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WC" >> "$GITHUB_ENV"

      - name: Build & push Docker image
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.VANCELIAN_PRIVY_APP_ID }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_PRIVY_APP_ID:-}" ]; then
            echo "::warning::VANCELIAN_PRIVY_APP_ID absent — le runtime ECS PRIVY_APP_ID reste requis."
          fi
          if [ -z "${NEXT_PUBLIC_BASE_RPC_URL:-}" ]; then
            echo "::error::NEXT_PUBLIC_BASE_RPC_URL absent — build impossible."
            exit 1
          fi
          if [ -z "${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}" ]; then
            echo "::error::NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID absent — build impossible."
            exit 1
          fi
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=https://api.arquantix.com \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://api.arquantix.com \
            --build-arg NEXT_PUBLIC_SITE_URL=https://vancelian.finance \
            --build-arg NEXT_PUBLIC_GIT_SHA=${{ github.sha }} \
            --build-arg NEXT_PUBLIC_PRIVY_APP_ID="${NEXT_PUBLIC_PRIVY_APP_ID}" \
            --build-arg NEXT_PUBLIC_BASE_RPC_URL="${NEXT_PUBLIC_BASE_RPC_URL}" \
            --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID="${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}" \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            -f services/arquantix/web/Dockerfile \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Render new task definition with updated image
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASKDEF_FAMILY }}
          container-name: vancelian-next
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          environment-variables: |
            RUN_PRISMA_MIGRATE_ON_START=0

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15
