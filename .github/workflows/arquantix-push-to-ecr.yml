# Legacy ECR push (coming-soon). Déploiement manuel uniquement — voir docs/arquantix/CI_DEPLOY_MATRIX.md
name: Arquantix - Push to ECR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: me-central-1
  ECR_REGISTRY: 411714852748.dkr.ecr.me-central-1.amazonaws.com
  ECR_REPOSITORY: arquantix-coming-soon
  IMAGE_TAG: ${{ inputs.tag || 'latest' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-arquantix-push-to-ecr-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker image
        run: |
          set -euo pipefail
          echo "🔨 Building Docker image..."
          echo "   Repository: ${{ env.ECR_REPOSITORY }}"
          echo "   Tag: ${{ env.IMAGE_TAG }}"
          echo "   Context: services/arquantix/coming-soon"
          
          docker build \
            --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -f services/arquantix/coming-soon/Dockerfile \
            services/arquantix/coming-soon
      
      - name: Push Docker image to ECR
        run: |
          set -euo pipefail
          echo "📤 Pushing image to ECR..."
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          echo "✅ Image pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
      
      - name: Verify image in ECR
        run: |
          set -euo pipefail
          echo "🔍 Verifying image in ECR..."
          aws ecr describe-images \
            --region ${{ env.AWS_REGION }} \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --query 'imageDetails[0].{digest:imageDigest,pushedAt:imagePushedAt}' \
            --output json || echo "⚠️  Image not found in ECR (may need to create repository first)"

