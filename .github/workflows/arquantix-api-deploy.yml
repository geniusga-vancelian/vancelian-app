# Production ECS + ECR: us-east-1 (Arquantix cluster).
name: Arquantix API (FastAPI) - Build & push ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/arquantix/api/**"
      - ".github/workflows/arquantix-api-deploy.yml"
      - "scripts/arquantix-provision-market-ws-service.sh"
      - "scripts/arquantix-sync-api-binance-vision-env-prod.sh"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: git SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 411714852748.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: arquantix-api
  ECS_CLUSTER: arquantix-cluster
  ECS_SERVICE: arquantix-api
  ECS_TASKDEF_FAMILY: arquantix-api
  ECS_MARKET_WS_SERVICE: arquantix-market-ws
  ECS_MARKET_WS_TASKDEF_FAMILY: arquantix-market-ws
  ECS_MARKET_WS_CONTAINER: arquantix-market-ws

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: gha-arquantix-api-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          set -euo pipefail
          echo "🔨 Building FastAPI image..."
          echo "   Tag: ${{ steps.set-tag.outputs.tag }}"
          docker build \
            --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            -f services/arquantix/api/Dockerfile \
            services/arquantix/api

      - name: Push Docker image to ECR
        run: |
          set -euo pipefail
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          echo "✅ Pushed: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}"

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --region ${{ env.AWS_REGION }} \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.set-tag.outputs.tag }} \
            --query 'imageDetails[0].{digest:imageDigest,pushedAt:imagePushedAt}' \
            --output json

      - name: Render new task definition with updated image
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_TASKDEF_FAMILY }}
          container-name: arquantix-api
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}

      - name: Deploy API to ECS (force-new-deployment + wait stable)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Ensure Binance market WS worker service exists
        run: |
          set -euo pipefail
          chmod +x scripts/arquantix-provision-market-ws-service.sh
          WAIT_STABLE=0 IMAGE_TAG="${{ steps.set-tag.outputs.tag }}" \
            ./scripts/arquantix-provision-market-ws-service.sh

      - name: Render market-ws task definition (same image as API)
        id: render-market-ws-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.ECS_MARKET_WS_TASKDEF_FAMILY }}
          container-name: ${{ env.ECS_MARKET_WS_CONTAINER }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}

      - name: Deploy market-ws worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-market-ws-taskdef.outputs.task-definition }}
          service: ${{ env.ECS_MARKET_WS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10
