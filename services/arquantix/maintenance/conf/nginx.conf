worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 256;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 30;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /dev/stdout main;

  gzip on;
  gzip_comp_level 4;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript image/svg+xml;

  server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;

    # /healthz est exempté pour permettre l'ALB health check (toujours 200).
    location = /healthz {
      access_log off;
      add_header Content-Type "text/plain; charset=utf-8";
      return 200 "ok\n";
    }

    # Assets statiques (logo, favicon) en 200 normal.
    location = /logo.svg {
      add_header Cache-Control "public, max-age=3600";
      try_files /logo.svg =404;
    }
    location = /favicon.ico {
      add_header Cache-Control "public, max-age=86400";
      try_files /favicon.ico =404;
    }

    # Tout le reste : 503 Service Unavailable + page maintenance.
    # error_page redirige vers /__maintenance qui sert le HTML mais préserve le 503.
    error_page 503 /__maintenance;

    location = /__maintenance {
      internal;
      add_header Content-Type "text/html; charset=utf-8";
      add_header Cache-Control "no-store, must-revalidate";
      add_header Retry-After "3600";
      try_files /index.html =500;
    }

    location / {
      return 503;
    }
  }
}
