<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Vancelian — Build your wealth, off-grid. Something new is on the way. Back very soon."
    />
    <title>Vancelian — Coming soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --v-container-desktop: 1280px;
        --v-pad-mobile: 16px;
        --v-pad-tablet: 24px;
        --v-pad-desktop: 48px;
        --v-topnav: 72px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #edecec;
        background: #141208;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* Same as site `.v-container` — max 1280px, responsive horizontal padding */
      .v-container {
        width: 100%;
        max-width: var(--v-container-desktop);
        margin-left: auto;
        margin-right: auto;
        padding-left: var(--v-pad-desktop);
        padding-right: var(--v-pad-desktop);
      }

      @media (max-width: 1024px) {
        .v-container {
          padding-left: var(--v-pad-tablet);
          padding-right: var(--v-pad-tablet);
        }
      }

      @media (max-width: 640px) {
        .v-container {
          padding-left: var(--v-pad-mobile);
          padding-right: var(--v-pad-mobile);
        }
      }

      .page {
        position: relative;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }

      .page__media {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .page__video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.02);
      }

      .page__fallback {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 40%, rgba(51, 97, 77, 0.35), transparent 55%),
          linear-gradient(135deg, #1a1815 0%, #141208 45%, #0d0c08 100%);
      }

      .page__scrim {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          rgba(20, 18, 8, 0.88) 0%,
          rgba(20, 18, 8, 0.62) 42%,
          rgba(20, 18, 8, 0.28) 100%
        );
      }

      .page__shell {
        position: relative;
        z-index: 2;
        display: flex;
        min-height: 100vh;
        min-height: 100dvh;
        flex-direction: column;
        padding-top: var(--v-topnav);
      }

      .page__header {
        flex-shrink: 0;
      }

      .page__logo {
        display: inline-block;
        line-height: 0;
      }

      .page__logo svg {
        display: block;
        width: min(148px, 42vw);
        height: auto;
      }

      .page__logo svg .mark {
        fill: #edecec;
      }

      .page__main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        min-height: calc(100dvh - var(--v-topnav));
        padding-bottom: 64px;
      }

      @media (min-width: 1024px) {
        .page__main {
          padding-bottom: 96px;
        }
      }

      /* Homepage hero copy column — cf. VHero `max-w-[640px]` */
      .page__hero-copy {
        width: 100%;
        max-width: 640px;
      }

      .page__eyebrow {
        margin: 0 0 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(237, 236, 236, 0.72);
      }

      .page__title {
        margin: 0;
        font-size: clamp(2.75rem, 8vw, 5.5rem);
        font-weight: 600;
        line-height: 1.05;
        letter-spacing: -0.03em;
        max-width: 12ch;
      }

      .page__title em {
        font-family: Newsreader, Georgia, 'Times New Roman', serif;
        font-style: italic;
        font-weight: 500;
        font-size: 1.08em;
        letter-spacing: -0.01em;
      }

      .page__lede {
        margin: 24px 0 0;
        max-width: 36rem;
        font-size: clamp(1rem, 2.2vw, 1.125rem);
        line-height: 1.55;
        color: rgba(237, 236, 236, 0.82);
      }

      .page__status {
        margin: 32px 0 0;
        padding-top: 24px;
        border-top: 1px solid rgba(237, 236, 236, 0.14);
        max-width: 28rem;
        font-size: 0.9375rem;
        line-height: 1.5;
        color: rgba(237, 236, 236, 0.62);
      }

      .page__status strong {
        color: rgba(237, 236, 236, 0.92);
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        .page__video {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!--
      Static maintenance / coming-soon page for vancelian.finance (AWS S3, CloudFront, etc.)

      Deploy checklist:
      1. Upload index.html and hero-bg.mp4 together (same S3 folder)
      2. hero-bg.mp4 = homepage hero (cms/vancelian-home/hero-bg.mp4)
      3. Point DNS / CloudFront maintenance mode to this bucket
    -->
    <div class="page">
      <div class="page__media" aria-hidden="true">
        <div class="page__fallback"></div>
        <video
          class="page__video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
        >
          <!-- Same asset as homepage hero: public/cms/vancelian-home/hero-bg.mp4 -->
          <source src="./hero-bg.mp4" type="video/mp4" />
        </video>
        <div class="page__scrim"></div>
      </div>

      <div class="page__shell">
        <header class="v-container page__header">
          <a class="page__logo" href="/" aria-label="Vancelian home">

              </g>
            </svg>
          </a>
        </header>

        <main class="v-container page__main">
          <div class="page__hero-copy">
            <p class="page__eyebrow">Coming soon</p>
            <h1 class="page__title">Build your wealth, <em>off-grid.</em></h1>
            <p class="page__lede">
              Grow your portfolio outside the usual rules — tokenised real estate, flexible savings,
              and curated crypto, in one place built for independence.
            </p>
            <p class="page__status">
              <strong>We&rsquo;re preparing the new experience.</strong>
              The site is under construction. Back very soon.
            </p>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
