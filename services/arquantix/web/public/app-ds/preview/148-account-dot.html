<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Account Dot · Webapp4</p>
<div class="pv-row" style="gap:32px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <span class="avt avt--40 avt--terra"><img class="avt__ic" src="/app-ds/assets/icons/payment-card.svg" alt="" /></span>
          <span class="pv-token__meta">Compte courant</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <span class="avt avt--40 avt--green"><img class="avt__ic" src="/app-ds/assets/icons/folder.svg" alt="" /></span>
          <span class="pv-token__meta">Coffre épargne</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <span class="avt avt--40 avt--blue"><img class="avt__ic" src="/app-ds/assets/icons/shield.svg" alt="" /></span>
          <span class="pv-token__meta">Patrimoine</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <span class="avt avt--40 avt--dark"><img class="avt__ic" src="/app-ds/assets/icons/wallet.svg" alt="" /></span>
          <span class="pv-token__meta">Wallet</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <span class="avt avt--40 avt--warm"><img class="avt__ic" src="/app-ds/assets/icons/bitcoin.svg" alt="" /></span>
          <span class="pv-token__meta">Crypto</span>
        </div>
      </div>
</div></body></html>
