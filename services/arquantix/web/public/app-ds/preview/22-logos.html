<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; font-family: var(--v-font-ui); background: var(--v-bg);
         display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
         min-height: 100vh; align-items: stretch; }
  .tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
          padding: 40px 24px; background: var(--v-white); border: 1px solid var(--v-fg-10); border-radius: 16px; }
  .tile img { display: block; }
  .h    { height: 28px; }
  .icon { height: 56px; }
  .v    { height: 60px; }
  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
         font-weight: 500; color: var(--v-fg-muted); }
</style></head>
<body>
  <div class="tile"><img class="h"    src="/brand/vancelian/logo-black-h.svg"    alt="Vancelian wordmark"/><div class="lbl">Horizontal</div></div>
  <div class="tile"><img class="icon" src="/brand/vancelian/logo-black-icon.svg" alt="Vancelian icon"    /><div class="lbl">Icon</div></div>
  <div class="tile"><img class="v"    src="/brand/vancelian/logo-black-v.svg"    alt="Vancelian vertical"/><div class="lbl">Vertical</div></div>
</body></html>
