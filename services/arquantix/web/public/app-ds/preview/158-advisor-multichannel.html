<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Advisor — Multi-channel · Webapp4</p>
<div class="v-card adv-B" style="max-width:520px">
        <div class="adv-B__header">
          <p class="adv-B__title">Trois manières de nous joindre.</p>
          <p class="adv-B__desc">Choisissez le canal qui vous convient. Hélène est en ligne en ce moment.</p>
        </div>
        <ul class="adv-B__rows">
          <li><button class="adv-B__row">
            <span class="adv-B__row-ic"><span class="ic" style="width:20px;height:20px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/phone.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/phone.svg) center/contain no-repeat"></span></span>
            <span class="adv-B__row-body">
              <span class="adv-B__row-title">Téléphone</span>
              <span class="adv-B__row-sub">+33 1 23 45 67 89 · L-V 9h-19h</span>
            </span>
            <span class="adv-B__row-status"></span>
            <span class="ic adv-B__row-chv" style="width:18px;height:18px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat"></span>
          </button></li>
          <li><button class="adv-B__row">
            <span class="adv-B__row-ic"><span class="ic" style="width:20px;height:20px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/mail.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/mail.svg) center/contain no-repeat"></span></span>
            <span class="adv-B__row-body">
              <span class="adv-B__row-title">Email</span>
              <span class="adv-B__row-sub">helene@vancelian.com · Réponse sous 1 h</span>
            </span>
            <span class="ic adv-B__row-chv" style="width:18px;height:18px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat"></span>
          </button></li>
          <li><button class="adv-B__row">
            <span class="adv-B__row-ic"><span class="ic" style="width:20px;height:20px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/document.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/document.svg) center/contain no-repeat"></span></span>
            <span class="adv-B__row-body">
              <span class="adv-B__row-title">Chat dans l'app</span>
              <span class="adv-B__row-sub">Temps de réponse moyen 4 min</span>
            </span>
            <span class="adv-B__row-status"></span>
            <span class="ic adv-B__row-chv" style="width:18px;height:18px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-right.svg) center/contain no-repeat"></span>
          </button></li>
        </ul>
      </div>
</div></body></html>
