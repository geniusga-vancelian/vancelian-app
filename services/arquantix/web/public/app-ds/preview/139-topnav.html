<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Top Nav · Webapp4</p>
<div class="pv-canvas pv-canvas--white" style="padding:0;align-items:stretch;overflow:hidden">
      <header class="topnav" style="position:relative">
        <a href="#" class="topnav__logo" aria-label="Vancelian">
          <img src="/app-ds/assets/logos/logo-black-h.svg" alt="Vancelian" />
        </a>
        <nav class="topnav__nav" aria-label="Navigation principale">
          <a href="#" class="topnav__link is-active">Mon portefeuille</a>
          <a href="#" class="topnav__link">Placer</a>
          <a href="#" class="topnav__link">Marchés</a>
          <a href="#" class="topnav__link">Académie</a>
        </nav>
        <div class="topnav__right">
          <button class="topnav__pill" type="button">
            <span class="ic" style="width:14px;height:14px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/wallet.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/wallet.svg) center/contain no-repeat"></span>
            <span>Wallet</span>
            <span class="ic ic--chv" style="width:12px;height:12px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat"></span>
          </button>
          <button class="topnav__pill" type="button">
            <span class="net-dot net-dot--base"></span>
            <span>Base</span>
            <span class="ic ic--chv" style="width:12px;height:12px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat"></span>
          </button>
          <span class="topnav__sep"></span>
          <button class="topnav__iconbtn" aria-label="Rechercher">
            <span class="ic" style="width:18px;height:18px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/search.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/search.svg) center/contain no-repeat"></span>
          </button>
          <a href="#" class="topnav__iconbtn topnav__bell" aria-label="Notifications">
            <span class="ic" style="width:18px;height:18px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/bell.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/bell.svg) center/contain no-repeat"></span>
          </a>
          <a href="#" class="topnav__profile" aria-label="Profil"><span class="avt avt--40">FL</span></a>
        </div>
      </header>
      <div style="padding:48px 48px 24px;border-top:1px solid var(--v-fg-10)">
        <p class="pv-caption" style="margin:0 0 6px">CONTENU DE PAGE</p>
        <p class="v-h2" style="margin:0">Mon portefeuille</p>
      </div>
    </div>
</div></body></html>
