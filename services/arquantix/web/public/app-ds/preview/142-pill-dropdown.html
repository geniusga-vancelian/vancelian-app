<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Pill Dropdown · Webapp4</p>
<div class="pv-canvas pv-canvas--white" style="overflow:visible">
      <div class="topnav__pillwrap" style="position:relative">
        <button class="topnav__pill is-open" type="button">
          <span class="net-dot net-dot--base"></span>
          <span>Base</span>
          <span class="ic ic--chv" style="width:12px;height:12px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/chevron-down.svg) center/contain no-repeat;transform:rotate(180deg)"></span>
        </button>
        <div class="dd" role="menu" style="width:240px;position:absolute;top:calc(100% + 8px);left:0;animation:none;opacity:1;transform:none">
          <div class="dd__section-lbl">Réseau</div>
          <button class="dd__item" type="button">
            <span class="net-dot net-dot--lg net-dot--base"></span>
            <span class="dd__item-name">Base</span>
            <span class="ic dd__item-check" style="width:16px;height:16px;background:currentColor;-webkit-mask:url(/app-ds/assets/icons/check.svg) center/contain no-repeat;mask:url(/app-ds/assets/icons/check.svg) center/contain no-repeat;color:var(--v-green)"></span>
          </button>
          <button class="dd__item" type="button">
            <span class="net-dot net-dot--lg net-dot--eth"></span>
            <span class="dd__item-name dd__item-name--muted">Ethereum</span>
          </button>
          <button class="dd__item" type="button">
            <span class="net-dot net-dot--lg net-dot--sol"></span>
            <span class="dd__item-name dd__item-name--muted">Solana</span>
          </button>
        </div>
      </div>
      <div style="height:140px"></div>
    </div>
</div></body></html>
