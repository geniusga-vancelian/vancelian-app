<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Support Card · Webapp4</p>
<div class="v-card v-card--grey" style="max-width:340px;display:flex;flex-direction:column;gap:14px">
        <span class="avt avt--40 avt--dark"><img class="avt__ic" src="/app-ds/assets/icons/info.svg" alt="" /></span>
        <div style="display:flex;flex-direction:column;gap:4px">
          <p style="margin:0;font-family:var(--v-font-ui);font-weight:600;font-size:15px;line-height:1.3;color:var(--v-fg)">Centre d'aide</p>
          <p style="margin:0;font-family:var(--v-font-ui);font-size:13px;line-height:1.5;color:var(--v-fg-muted)">Comment déposer des fonds, fiscalité d'un placement, sécurité du wallet…</p>
        </div>
        <button class="btn btn--secondary btn--sm" style="align-self:flex-start">Consulter</button>
      </div>
</div></body></html>
