<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--v-bg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .sw .chip { aspect-ratio: 3/2; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font-family: var(--v-font-ui); font-weight: 500; font-size: 13px; color: var(--v-fg); }
  .sw .hex { font-family: var(--v-font-ui); font-size: 12px; color: var(--v-fg-muted); font-feature-settings: "tnum" on; }
  .sw .role { font-family: var(--v-font-ui); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--v-fg-light); }
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#C0512E"></div><div class="name">Terracotta</div><div class="hex">#C0512E</div><div class="role">Primary · accent</div></div>
  <div class="sw"><div class="chip" style="background:#33614D"></div><div class="name">Vert anglais</div><div class="hex">#33614D</div><div class="role">Success · patrimoine</div></div>
  <div class="sw"><div class="chip" style="background:#0F2A47"></div><div class="name">Bleu de Prusse</div><div class="hex">#0F2A47</div><div class="role">Info · institutionnel</div></div>
  <div class="sw"><div class="chip" style="background:#C99A2E"></div><div class="name">Safran</div><div class="hex">#C99A2E</div><div class="role">Warning</div></div>
  <div class="sw"><div class="chip" style="background:#B83A3A"></div><div class="name">Error</div><div class="hex">#B83A3A</div><div class="role">Error · seul rouge</div></div>
</div>
</body></html>
