<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Logo · Webapp4</p>
<section class="pv-section">
      <h3 class="pv-section__title">Wordmark — horizontal</h3>
      <div class="pv-canvas pv-canvas--white" style="align-items:center">
        <img src="/app-ds/assets/logos/logo-black-h.svg" alt="Vancelian" style="height:40px;display:block" />
      </div>
    </section>
    <section class="pv-section">
      <h3 class="pv-section__title">Wordmark — vertical</h3>
      <div class="pv-canvas pv-canvas--white" style="align-items:center">
        <img src="/app-ds/assets/logos/logo-black-v.svg" alt="Vancelian" style="height:80px;display:block" />
      </div>
    </section>
    <section class="pv-section">
      <h3 class="pv-section__title">Icône seule</h3>
      <div class="pv-canvas pv-canvas--white" style="align-items:center">
        <img src="/app-ds/assets/logos/logo-black-icon.svg" alt="V" style="height:48px;display:block" />
      </div>
    </section>
    <section class="pv-section">
      <h3 class="pv-section__title">Variantes sur fond sombre</h3>
      <div class="pv-canvas pv-canvas--dark" style="align-items:center">
        <p class="v-wordmark" style="color:#EDECEC">VANCELIAN</p>
        <p class="v-eyebrow" style="color:rgba(237,236,236,0.6);margin:0">Composé en Newsreader · 0.4em uppercase</p>
      </div>
    </section>
</div></body></html>
