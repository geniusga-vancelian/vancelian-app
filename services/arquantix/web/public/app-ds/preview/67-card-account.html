<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .list { background: var(--v-white); border-radius: 12px; padding: 8px;
          box-shadow: var(--v-elev-subtle); border: 1px solid var(--v-fg-10);
          width: 560px; }
  .item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; }

  /* Kalai mask glyphs for the avatar — referenced via .avt__ic (preview/16) */
  .avt__ic--card    { -webkit-mask-image: url("/icons/kalai/payment-card.svg"); mask-image: url("/icons/kalai/payment-card.svg"); }
  .avt__ic--savings { -webkit-mask-image: url("/icons/kalai/suitcase.svg");     mask-image: url("/icons/kalai/suitcase.svg"); }
  .avt__ic--star    { -webkit-mask-image: url("/icons/kalai/star.svg");         mask-image: url("/icons/kalai/star.svg"); }
  .avt__ic--basket  { -webkit-mask-image: url("/icons/kalai/shopping-bag.svg"); mask-image: url("/icons/kalai/shopping-bag.svg"); }
  .avt__ic--btc     { -webkit-mask-image: url("/icons/kalai/bitcoin.svg");      mask-image: url("/icons/kalai/bitcoin.svg"); }

  .body { flex: 1; min-width: 0; }
  .title { font-weight: 700; font-size: 17px; line-height: 1.25; color: var(--v-fg); }
  .sub { font-size: 14px; color: var(--v-fg-light); margin-top: 2px; }

  .right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
           min-width: max-content; flex-shrink: 0; }
  .amt { font-weight: 700; font-size: 16px; color: var(--v-fg);
         font-feature-settings: "tnum" on; white-space: nowrap; line-height: 1.1; }

  /* Inline gain indicator — arrow + value, no pill */
  .indic { display: inline-flex; align-items: center; gap: 4px;
           font-size: 13px; font-weight: 600;
           font-feature-settings: "tnum" on; white-space: nowrap; line-height: 1; }
  .indic.up   { color: var(--v-green); }
  .indic.dn   { color: var(--v-error); }
  .indic.plus { color: var(--v-green); }
  .indic svg  { width: 12px; height: 12px; display: block; }

  .chv { color: var(--v-fg-20); flex-shrink: 0; }
  .chv svg { display: block; }
</style></head>
<body>
<div class="list">

  <div class="item">
    <span class="avt avt--52 avt--dark"><img class="avt__ic" src="/icons/kalai/payment-card.svg" alt=""/><span class="avt__notif">1</span></span>
    <div class="body">
      <div class="title">Euro Account</div>
      <div class="sub">Virement reçu</div>
    </div>
    <div class="right">
      <div class="amt">12 480,00&nbsp;€</div>
      <div class="indic plus">+ 1 250,00&nbsp;€</div>
    </div>
    <span class="chv"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg></span>
  </div>

  <div class="item">
    <span class="avt avt--52 avt--dark"><img class="avt__ic" src="/icons/kalai/suitcase.svg" alt=""/></span>
    <div class="body">
      <div class="title">Projets d'épargne</div>
      <div class="sub">4 objectifs · livret jeunes</div>
    </div>
    <div class="right">
      <div class="amt">8 240,00&nbsp;€</div>
      <div class="indic up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        4,8&nbsp;%
      </div>
    </div>
    <span class="chv"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg></span>
  </div>

  <div class="item">
    <span class="avt avt--52 avt--dark"><img class="avt__ic" src="/icons/kalai/star.svg" alt=""/></span>
    <div class="body">
      <div class="title">Exclusive offers</div>
      <div class="sub">Niseko · Provence · Bali</div>
    </div>
    <div class="right">
      <div class="amt">22 800,00&nbsp;€</div>
      <div class="indic up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        7,2&nbsp;%
      </div>
    </div>
    <span class="chv"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg></span>
  </div>

  <div class="item">
    <span class="avt avt--52 avt--dark"><img class="avt__ic" src="/icons/kalai/shopping-bag.svg" alt=""/></span>
    <div class="body">
      <div class="title">Crypto baskets</div>
      <div class="sub">DeFi index · Layer 1 majors</div>
    </div>
    <div class="right">
      <div class="amt">3 920,00&nbsp;€</div>
      <div class="indic up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        12,4&nbsp;%
      </div>
    </div>
    <span class="chv"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg></span>
  </div>

  <div class="item">
    <span class="avt avt--52 avt--dark"><img class="avt__ic" src="/icons/kalai/bitcoin.svg" alt=""/></span>
    <div class="body">
      <div class="title">Crypto</div>
      <div class="sub">BTC · ETH · spot</div>
    </div>
    <div class="right">
      <div class="amt">1 480,00&nbsp;€</div>
      <div class="indic dn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        3,1&nbsp;%
      </div>
    </div>
    <span class="chv"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 6 15 12 9 18"/></svg></span>
  </div>

</div>
</body></html>
