<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>

<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}

<body><div class="stage"><p class="lbl">Advisor — Portrait · Webapp4</p>
<div class="adv-A" style="max-width:340px">

          <span class="adv-A__portrait" style="background-image:url(/app-ds/assets/photos/advisor-helene.jpg)"></span>
          <div class="adv-A__title-block">
            <p class="adv-A__eyebrow">Votre conseillère</p>

          </div>
        </div>

        </div>
      </div>
