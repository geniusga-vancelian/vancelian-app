<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 24px; align-items: center; justify-content: center; }
  .num { font-family: var(--v-font-ui); font-weight: 600; font-size: 48px;
         color: var(--v-fg); font-feature-settings: "tnum" on, "lnum" on;
         letter-spacing: -0.02em; line-height: 1; }
  .lbl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--v-fg-muted); }
</style></head>
<body>
  <div class="lbl">Amount · Inter SemiBold · tabular</div>
  <div class="num">48 920,00&nbsp;€</div>
  <div class="lbl">font-feature-settings: "tnum" on, "lnum" on</div>
</body></html>
