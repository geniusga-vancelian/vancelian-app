<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 28px;
         align-items: center; min-height: 100vh; }

  /* ============================================================
     Skeleton loading — shimmer placeholder for async content
       .sk            — base block (animated bg)
       .sk--text      — single line (12 px)
       .sk--text-lg   — heading line (22 px)
       .sk--circle    — round (avatar / icon)
       .sk--card      — block
     Composition: build a "ghost" version of the real layout
     with .sk replacing each text/image element.
     ============================================================ */
  @keyframes sk-shimmer {
    0%   { background-position: -200px 0; }
    100% { background-position: calc(200px + 100%) 0; }
  }
  .sk {
    border-radius: 6px;
    background: linear-gradient(90deg,
      var(--v-fg-10) 0%,
      var(--v-fg-05) 40%,
      var(--v-fg-10) 80%);
    background-size: 200px 100%; background-repeat: no-repeat;
    background-color: var(--v-fg-10);
    animation: sk-shimmer 1.6s infinite linear;
  }
  .sk--text     { height: 12px; width: 100%; }
  .sk--text-lg  { height: 22px; width: 60%; border-radius: 4px; }
  .sk--text-sm  { height: 10px; width: 40%; }
  .sk--circle   { border-radius: 999px; width: 52px; height: 52px; flex-shrink: 0; }
  .sk--btn      { height: 40px; width: 100px; border-radius: 999px; }

  /* ---- Demo containers ---- */
  .card { width: 390px; max-width: 100%;
          background: var(--v-white); border-radius: 12px; padding: 16px;
          border: 1px solid var(--v-fg-10);
          display: flex; flex-direction: column; gap: 14px; }
  .row  { display: flex; align-items: center; gap: 14px; }
  .lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  /* Spinner (alternative for short waits) */
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--v-fg-10);
    border-top-color: var(--v-fg);
    border-radius: 999px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Linear progress bar */
  .lp { width: 100%; height: 4px; border-radius: 999px;
        background: var(--v-fg-10); overflow: hidden; position: relative; }
  .lp::after {
    content: ""; position: absolute; inset: 0;
    background: var(--v-fg);
    width: 40%;
    animation: lp-slide 1.4s infinite ease-in-out;
  }
  @keyframes lp-slide {
    0%   { transform: translateX(-100%); }
    60%  { transform: translateX(150%); }
    100% { transform: translateX(150%); }
  }
</style></head>
<body>

  <p class="v-eyebrow--sm">Transaction list · 3 skeleton rows</p>
  <div class="card">
    <div class="row">
      <div class="sk sk--circle"></div>
      <div class="lines">
        <div class="sk sk--text-lg" style="width:55%"></div>
        <div class="sk sk--text" style="width:40%"></div>
      </div>
      <div class="sk sk--text" style="width:70px;height:14px"></div>
    </div>
    <div class="row">
      <div class="sk sk--circle"></div>
      <div class="lines">
        <div class="sk sk--text-lg" style="width:70%"></div>
        <div class="sk sk--text" style="width:50%"></div>
      </div>
      <div class="sk sk--text" style="width:70px;height:14px"></div>
    </div>
    <div class="row">
      <div class="sk sk--circle"></div>
      <div class="lines">
        <div class="sk sk--text-lg" style="width:45%"></div>
        <div class="sk sk--text" style="width:35%"></div>
      </div>
      <div class="sk sk--text" style="width:70px;height:14px"></div>
    </div>
  </div>

  <p class="v-eyebrow--sm">Balance card · skeleton</p>
  <div class="card" style="background:var(--v-card-warm);border:0;gap:24px;padding:20px">
    <div class="lines" style="gap:12px">
      <div class="sk sk--text-sm" style="width:30%"></div>
      <div class="sk" style="height:40px;width:55%;border-radius:6px"></div>
      <div class="sk sk--text" style="width:45%;height:14px"></div>
    </div>
    <div class="sk" style="height:80px;width:100%"></div>
    <div class="row" style="gap:12px">
      <div class="sk sk--circle" style="width:48px;height:48px"></div>
      <div class="sk sk--circle" style="width:48px;height:48px"></div>
      <div class="sk sk--circle" style="width:48px;height:48px"></div>
      <div class="sk sk--circle" style="width:48px;height:48px"></div>
    </div>
  </div>

  <p class="v-eyebrow--sm">Indeterminate spinner + linear progress</p>
  <div class="card" style="flex-direction:row;align-items:center;justify-content:space-around;padding:24px">
    <div class="spinner"></div>
    <div style="flex:1;max-width:200px"><div class="lp"></div></div>
  </div>

</body></html>
