<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 32px; align-items: center; min-height: 100vh; }

  /* ============================================================
     1. Offre exclusive — square card with text + CTA below
     ============================================================ */
  .offer { width: 360px; background: var(--v-white); border-radius: 16px; overflow: hidden;
           border: 1px solid var(--v-fg-10); box-shadow: 0 2px 6px rgba(26,24,21,0.07); }
  .offer__media {
    position: relative; aspect-ratio: 1 / 1; overflow: hidden;
    background: linear-gradient(135deg, #B7CFE6 0%, #6C8FB3 40%, #1F3C5C 100%);
  }
  .offer__cat {
    position: absolute; top: 16px; left: 16px;
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 12px; border-radius: 999px;
    background: rgba(255,255,255,0.92); color: var(--v-fg);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-size: 13px; font-weight: 600;
  }
  .offer__cat svg { width: 14px; height: 14px; }
  .offer__chips {
    position: absolute; left: 16px; right: 16px; bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .o-chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 12px; border-radius: 999px;
    background: rgba(255,255,255,0.92); color: var(--v-fg);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-size: 12px; font-weight: 600;
    font-feature-settings: "tnum" on; white-space: nowrap;
  }
  .o-chip svg { width: 14px; height: 14px; flex-shrink: 0; }
  .o-chip--progress { flex: 1; min-width: 0; gap: 8px; padding: 0 12px; }
  .o-chip__bar { flex: 1; height: 4px; border-radius: 999px; background: var(--v-fg-10); overflow: hidden; min-width: 32px; }
  .o-chip__bar span { display: block; height: 100%; background: var(--v-fg); border-radius: 999px; }

  .offer__body { padding: 16px 16px 20px; display: flex; align-items: center; gap: 16px; }
  .offer__text { flex: 1; min-width: 0; }
  .offer__title { font-weight: 700; font-size: 17px; color: var(--v-fg); margin: 0 0 4px; line-height: 1.25; }
  .offer__desc { font-size: 14px; color: var(--v-fg-light); margin: 0; line-height: 1.45; }
  .offer__cta {
    display: inline-flex; align-items: center; height: 44px; padding: 0 22px;
    border-radius: 999px; background: var(--v-fg); color: var(--v-white);
    font-weight: 600; font-size: 14px; flex-shrink: 0; border: 0; cursor: pointer;
  }

  /* ============================================================
     2. Offre exclusive — marketing (full-width banner)
     ============================================================ */
  .mkt {
    position: relative; width: 100%; max-width: 720px;
    aspect-ratio: 21 / 9; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--v-fg-10);
    background:
      radial-gradient(800px 360px at 30% 30%, rgba(192,81,46,0.35), transparent 60%),
      linear-gradient(135deg, #1F3C5C 0%, #2c5275 50%, #1A1815 100%);
    color: var(--v-white);
    display: flex; align-items: center; justify-content: center;
    padding: 48px 56px;
  }
  .mkt__title {
    margin: 0;
    text-align: center;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--v-white);
  }
  .mkt__title .ui {
    font-family: var(--v-font-ui); font-weight: 500;
    font-size: clamp(36px, 6vw, 56px);
  }
  .mkt__title .ed {
    font-family: var(--v-font-editorial); font-weight: 300; font-style: italic;
    font-size: clamp(40px, 6.6vw, 64px);
  }
  .mkt__cta {
    position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 8px;
    height: 44px; padding: 0 22px; border-radius: 999px;
    background: var(--v-white); color: var(--v-fg);
    font-family: var(--v-font-ui); font-weight: 600; font-size: 14px;
    border: 0; cursor: pointer; white-space: nowrap;
  }
  .mkt__cta svg { width: 14px; height: 14px; }
</style></head>
<body>

  <!-- 1. Square offer card -->
  <div class="offer">
    <div class="offer__media">
      <span class="offer__cat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 4l9 8M5 10v10h14V10"/></svg>
        Real Estate
      </span>
      <div class="offer__chips">
        <span class="o-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><circle cx="16" cy="9" r="2"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M14 19c0-2 2-3 4-3s4 1 4 3"/></svg>
          43
        </span>
        <span class="o-chip o-chip--progress">
          3 612 394 €
          <span class="o-chip__bar"><span style="width:64%"></span></span>
        </span>
        <span class="o-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="12" cy="12.5" r="2.5"/></svg>
          11M
        </span>
      </div>
    </div>
    <div class="offer__body">
      <div class="offer__text">
        <h3 class="offer__title">Nom de l'offre</h3>
        <p class="offer__desc">Cum saepe multa, tum memini domi in hemicyclio sedentem</p>
      </div>
      <button class="offer__cta">Invest</button>
    </div>
  </div>

  <!-- 2. Marketing banner — full width, editorial typography, single CTA -->
  <div class="mkt">
    <h2 class="mkt__title">
      <span class="ui">La beauté </span><span class="ed">du Japon</span>
    </h2>
    <button class="mkt__cta">
      Découvrir
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>

</body></html>
