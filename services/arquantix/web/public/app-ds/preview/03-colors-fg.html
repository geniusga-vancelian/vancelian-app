<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--v-bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .sw .chip { aspect-ratio: 3/2; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .sw .name { font-family: var(--v-font-ui); font-weight: 500; font-size: 13px; color: var(--v-fg); }
  .sw .hex { font-family: var(--v-font-ui); font-size: 12px; color: var(--v-fg-muted); font-feature-settings: "tnum" on; }
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#1A1815"></div><div class="name">Fg (anthracite)</div><div class="hex">#1A1815</div></div>
  <div class="sw"><div class="chip" style="background:#3A352F"></div><div class="name">Fg body</div><div class="hex">#3A352F</div></div>
  <div class="sw"><div class="chip" style="background:#6E665C"></div><div class="name">Fg muted</div><div class="hex">#6E665C</div></div>
  <div class="sw"><div class="chip" style="background:#8E867A"></div><div class="name">Fg light</div><div class="hex">#8E867A</div></div>
</div>
</body></html>
