<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: #C0512E; border-radius: 2px; }
  .val { font-size: 11px; color: var(--v-fg-muted); font-feature-settings: "tnum" on; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="val">4</div></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="val">8</div></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="val">12</div></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="val">16</div></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="val">24</div></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="val">32</div></div>
  <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="val">48</div></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="val">64</div></div>
</div>
</body></html>
