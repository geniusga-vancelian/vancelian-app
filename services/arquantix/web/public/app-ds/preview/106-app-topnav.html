<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/components/icon/icon.css"/>
<link rel="stylesheet" href="/app-ds/components/app-topnav/app-topnav.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}

</style></head><body><div class="stage"><p class="lbl">App topnav · produit</p>
<header class="topnav" style="position:relative;border-radius:var(--v-radius-lg);overflow:hidden;">
  <a class="topnav__logo" href="#"><img src="/brand/vancelian/logo-black-h.svg" alt="Vancelian" height="22"/></a>
  <nav class="topnav__nav" aria-label="Principal">
    <a class="topnav__link is-active" href="#">Portefeuille</a>
    <a class="topnav__link" href="#">Marchés</a>
    <a class="topnav__link" href="#">Académie</a>
  </nav>
  <div class="topnav__right">
    <div class="topnav__pillwrap">
      <button type="button" class="topnav__pill">
        <span class="ic" style="width:16px;height:16px;-webkit-mask-image:url('/icons/kalai/wallet.svg');mask-image:url('/icons/kalai/wallet.svg');"></span>
        Mon wallet
        <span class="ic ic--chv" style="width:12px;height:12px;-webkit-mask-image:url('/icons/kalai/chevron-down.svg');mask-image:url('/icons/kalai/chevron-down.svg');"></span>
      </button>
    </div>
    <span class="topnav__sep"></span>
    <button type="button" class="topnav__iconbtn topnav__bell" aria-label="Notifications">
      <span class="ic" style="width:18px;height:18px;-webkit-mask-image:url('/icons/kalai/bell.svg');mask-image:url('/icons/kalai/bell.svg');"></span>
    </button>
    <button type="button" class="topnav__iconbtn" aria-label="Rechercher">
      <span class="ic" style="width:18px;height:18px;-webkit-mask-image:url('/icons/kalai/search.svg');mask-image:url('/icons/kalai/search.svg');"></span>
    </button>
    <button type="button" class="topnav__profile" aria-label="Profil">
      <span class="avt avt--warm" style="--avt-size:36px">GM</span>
    </button>
  </div>
</header>
</div></body></html>
