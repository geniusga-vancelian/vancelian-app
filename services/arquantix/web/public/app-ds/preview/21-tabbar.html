<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 40px; min-height: 100vh;
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; align-items: center; justify-content: center;
         /* Wallpaper-like background with soft color blobs so the glass is legible */
         background:
           radial-gradient(620px 360px at 18% 30%, rgba(192,81,46,0.32), transparent 60%),
           radial-gradient(560px 380px at 86% 22%, rgba(15,42,71,0.30), transparent 65%),
           radial-gradient(520px 360px at 60% 90%, rgba(51,97,77,0.30), transparent 60%),
           #F7F7F4;
  }
  .stage { position: relative; width: 460px; height: 280px;
           display: flex; align-items: flex-end; justify-content: center;
           padding-bottom: 18px; }

  /* iOS 26-style liquid-glass tab bar */
  .tabbar {
    display: inline-flex; align-items: center; gap: 2px;
    height: 60px; padding: 2px;
    border-radius: 36px;
    background: rgba(247, 247, 244, 0.45);
    backdrop-filter: saturate(180%) blur(28px);
    -webkit-backdrop-filter: saturate(180%) blur(28px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 14px 36px rgba(26,24,21,0.18),
      0 2px 6px rgba(26,24,21,0.06);
  }
  .item {
    position: relative;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    width: 64px; height: 52px; border-radius: 26px;
    color: var(--v-fg);
    cursor: pointer;
    transition: background 160ms var(--v-ease-out), color 160ms var(--v-ease-out);
  }
  .item .lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }
  .item.on {
    background: rgba(255,255,255,0.7);
    color: var(--v-terracotta);
    box-shadow: 0 1px 1px rgba(255,255,255,0.7) inset, 0 1px 2px rgba(26,24,21,0.06);
  }
  svg { display: block; }
</style></head>
<body>
  <div class="stage">
    <div class="tabbar">
      <div class="item on">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M3 6a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v2a1 1 0 1 1-2 0V6a1 1 0 0 0-1-1H6a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-2a1 1 0 1 1 2 0v2a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M12 9a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2V9Zm8 0h-6v6h6V9Z" clip-rule="evenodd"/><path d="M18.5 12a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/></svg>
        <span class="lbl">Comptes</span>
      </div>
      <div class="item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M21.78 5.376a1 1 0 0 1 .03 1.413l-6.5 6.875a1 1 0 0 1-1.413.038l-4.05-3.825-6.077 6.55a1 1 0 1 1-1.466-1.36l6.75-7.275a1 1 0 0 1 1.42-.061l4.073 3.846 5.82-6.156a1 1 0 0 1 1.413-.045z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M16 7a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 1 1-2 0V8h-4a1 1 0 0 1-1-1z" clip-rule="evenodd"/></svg>
        <span class="lbl">Placement</span>
      </div>
      <div class="item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7 6a1 1 0 0 1 1 1v10a1 1 0 1 1-2 0V7a1 1 0 0 1 1-1Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M6 12a1 1 0 0 1 1-1h7.5a3.5 3.5 0 1 1 0 7H7a1 1 0 0 1-1-1v-5Zm2 1v3h6.5a1.5 1.5 0 0 0 0-3H8Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M6 7a1 1 0 0 1 1-1h7.5a3.5 3.5 0 1 1 0 7H7a1 1 0 0 1-1-1V7Zm2 1v3h6.5a1.5 1.5 0 0 0 0-3H8Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M9 4a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V5a1 1 0 0 1 1-1Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M9 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M13 4a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Z" clip-rule="evenodd"/><path fill-rule="evenodd" d="M13 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1Z" clip-rule="evenodd"/></svg>
        <span class="lbl">Crypto</span>
      </div>
      <div class="item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M5 5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V8a3 3 0 0 0-3-3H5Zm-1 3a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v1H4V8Zm0 3v5a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-5H4Z" clip-rule="evenodd"/></svg>
        <span class="lbl">Carte</span>
      </div>
      <div class="item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="lbl">Découvrir</span>
      </div>
    </div>
  </div>
</body></html>
