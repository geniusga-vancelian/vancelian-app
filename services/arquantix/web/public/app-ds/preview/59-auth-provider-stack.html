<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 28px;
         align-items: stretch; max-width: 420px; margin: 0 auto; min-height: 100vh; }

  /* ============================================================
     Auth / Provider stack — used on Login + Inscription screens.
     Email input → primary CTA → "or" divider → dark provider rows.
     ============================================================ */
  .auth { display: flex; flex-direction: column; gap: 14px; }

  .auth__divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--v-fg-light); font-size: 14px;
    margin: 4px 0;
  }
  .auth__divider::before,
  .auth__divider::after {
    content: ""; flex: 1; height: 1px; background: var(--v-fg-10);
  }

  /* Provider button — dark pill, label centred, icon on the right */
  .prov {
    height: 56px; padding: 0 22px;
    background: var(--v-fg); color: var(--v-white);
    border-radius: 999px; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 15px;
    transition: background 120ms var(--v-ease-out);
  }
  .prov:hover { background: var(--v-fg-hover); }
  .prov__ic { width: 22px; height: 22px; flex-shrink: 0;
              display: inline-flex; align-items: center; justify-content: center; }
  .prov__ic svg { width: 100%; height: 100%; }

  /* Footer link line */
  .auth__foot {
    margin-top: 4px; text-align: center;
    font-size: 14px; color: var(--v-fg-muted);
  }
  .auth__foot a { color: var(--v-fg); font-weight: 600; text-decoration: none; cursor: pointer; }
  .auth__foot a:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* Primary CTA (reuses pattern of cta-stack) */
  .btn-primary {
    height: 56px; border-radius: 999px;
    background: var(--v-fg); color: var(--v-white);
    border: 0; cursor: pointer;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 15px;
  }

  /* Email input — pill, leading mail icon */
  .fld {
    height: 56px; padding: 0 18px;
    background: var(--v-white); border: 1px solid var(--v-fg-10);
    border-radius: 999px;
    display: flex; align-items: center; gap: 12px;
  }
  .fld__ic {
    width: 20px; height: 20px; flex-shrink: 0;
    background: var(--v-fg-light);
    -webkit-mask: url("/icons/kalai/email.svg") center/contain no-repeat;
            mask: url("/icons/kalai/email.svg") center/contain no-repeat;
  }
  .fld input {
    flex: 1; min-width: 0; border: 0; outline: 0; background: transparent;
    font: inherit; font-size: 15px; color: var(--v-fg);
  }
  .fld input::placeholder { color: var(--v-fg-light); }
</style></head>
<body>
  <div class="auth">
    <div class="fld">
      <span class="fld__ic"></span>
      <input placeholder="Label" />
    </div>
    <button class="btn-primary">Continue</button>

    <div class="auth__divider">or</div>

    <button class="prov">
      Continue with access key
      <span class="prov__ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8" cy="15" r="4"/><path d="M10.9 12.1L20 3"/><path d="M17 6l3 3M14 9l3 3"/>
        </svg>
      </span>
    </button>
    <button class="prov">
      Continue with Apple
      <span class="prov__ic">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 12.04c0-1.85 1.49-2.73 1.55-2.77-0.84-1.23-2.15-1.4-2.62-1.42-1.12-0.11-2.18 0.66-2.74 0.66-0.58 0-1.45-0.65-2.39-0.63-1.23 0.02-2.36 0.71-2.99 1.82-1.27 2.2-0.32 5.45 0.92 7.24 0.61 0.87 1.34 1.86 2.29 1.82 0.92-0.04 1.27-0.59 2.38-0.59 1.1 0 1.42 0.59 2.39 0.57 0.99-0.02 1.61-0.89 2.21-1.77 0.7-1.01 0.99-1.99 1-2.04-0.02-0.01-1.92-0.74-1.94-2.93zm-1.79-5.39c0.51-0.62 0.85-1.48 0.76-2.34-0.73 0.03-1.62 0.49-2.15 1.1-0.47 0.55-0.89 1.43-0.78 2.27 0.82 0.06 1.65-0.42 2.17-1.03z"/>
        </svg>
      </span>
    </button>
    <button class="prov">
      Continue with Google
      <span class="prov__ic">
        <svg viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.5c1.6 0 3.05.55 4.2 1.6l3.1-3.05C17.4 2.05 14.85 1 12 1 7.4 1 3.45 3.65 1.55 7.5l3.6 2.8C6.05 7.45 8.75 5.5 12 5.5z"/>
          <path fill="#34A853" d="M12 23c2.85 0 5.25-0.95 7-2.55l-3.4-2.65c-0.95 0.65-2.15 1.05-3.6 1.05-3.25 0-6-2.2-7-5.15l-3.55 2.75C3.35 20.3 7.4 23 12 23z"/>
          <path fill="#4285F4" d="M23 12c0-0.8-0.1-1.55-0.2-2.3H12v4.4h6.2c-0.3 1.4-1.1 2.6-2.3 3.4l3.4 2.65C21.45 18.05 23 15.3 23 12z"/>
          <path fill="#FBBC05" d="M5 13.7c-0.25-0.75-0.4-1.55-0.4-2.4s0.15-1.65 0.4-2.4l-3.55-2.75C0.5 8.05 0 9.95 0 12s0.5 3.95 1.4 5.85L5 13.7z"/>
        </svg>
      </span>
    </button>

    <p class="auth__foot">Vous n'avez pas de compte ? <a>Inscription</a></p>
  </div>
</body></html>
