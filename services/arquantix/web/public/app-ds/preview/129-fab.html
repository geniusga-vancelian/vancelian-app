<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">FAB · Webapp4</p>
<div class="pv-row">
        <button class="fab fab--dark" aria-label="Ajouter"><img src="/app-ds/assets/icons/plus.svg" alt="" width="24" height="24" /></button>
        <button class="fab fab--terra" aria-label="Investir"><img src="/app-ds/assets/icons/arrow-up-right.svg" alt="" width="24" height="24" /></button>
        <button class="fab fab--md fab--dark" aria-label="Ajouter"><img src="/app-ds/assets/icons/plus.svg" alt="" width="20" height="20" /></button>
      </div>
    </div>
    <div class="pv-canvas pv-canvas--dark">
      <div class="pv-row">
        <button class="fab fab--white" aria-label="Ajouter" style="color:var(--v-fg)"><img src="/app-ds/assets/icons/plus.svg" alt="" width="24" height="24" /></button>
      </div>
</div></body></html>
