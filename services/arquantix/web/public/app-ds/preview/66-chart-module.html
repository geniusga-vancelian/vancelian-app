<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 32px;
         align-items: center; min-height: 100vh; max-width: 460px; margin: 0 auto; }
  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
         font-weight: 500; color: var(--v-fg-light); align-self: flex-start; margin: 0; }

  /* ============================================================
     Chart module — wrapped in a white card per DS surfaces.
     ============================================================ */
  .ch-card {
    width: 100%;
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
    border-radius: 16px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* Asset meta row — action-row shell, no trailing action */
  .ch-meta {
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
    border-radius: 14px;
    padding: 2px; gap: 2px;
    display: flex; align-items: stretch;
    min-height: 68px;
  }
  .ch-meta__avt {
    width: 64px; flex-shrink: 0; align-self: stretch;
    border-radius: 12px;
    background: var(--v-card-warm); color: var(--v-fg-muted);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ch-meta__avt::before {
    content: ""; width: 28px; height: 28px; background: currentColor;
    -webkit-mask: url("/icons/kalai/trending-up.svg") center/contain no-repeat;
            mask: url("/icons/kalai/trending-up.svg") center/contain no-repeat;
  }
  .ch-meta__body {
    flex: 1; min-width: 0; padding: 10px 0 10px 14px;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
  }
  .ch-meta__price {
    font-family: var(--v-font-ui); font-weight: 700; font-size: 22px;
    line-height: 1.1; color: var(--v-fg);
    font-feature-settings: "tnum" on, "lnum" on;
  }
  .ch-meta__var {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 14px;
    font-feature-settings: "tnum" on;
  }
  .ch-meta__var--up { color: var(--v-green); }
  .ch-meta__var--dn { color: var(--v-error); }
  .ch-meta__sep { width: 1px; height: 14px; background: var(--v-fg-10); }

  /* Chart canvas */
  .ch-canvas { position: relative; width: 100%; aspect-ratio: 320 / 160; }
  .ch-canvas svg { display: block; width: 100%; height: 100%; }
  .ch-grid { stroke: var(--v-fg-10); stroke-width: 1; }
  .ch-line {
    fill: none; stroke: var(--v-fg); stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* Tooltip — pill anchored on a curve point.
     We place the dot at the precise y of the curve, then sit the pill
     above the dot via translate(-50%, -120%). */
  .ch-tooltip {
    position: absolute; transform: translate(-50%, calc(-100% - 10px));
    background: var(--v-card-warm); color: var(--v-fg);
    height: 26px; padding: 0 12px; border-radius: 999px;
    display: inline-flex; align-items: center;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 11px;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(26,24,21,0.05);
  }
  .ch-tooltip__dot {
    position: absolute; width: 10px; height: 10px; border-radius: 999px;
    background: var(--v-fg); transform: translate(-50%, -50%);
  }
  /* Endpoint dot */
  .ch-end {
    position: absolute; width: 14px; height: 14px; border-radius: 999px;
    background: var(--v-fg);
    box-shadow: 0 0 0 4px rgba(26,24,21,0.08);
    transform: translate(-50%, -50%);
  }

  /* Period selector + chart-type toggle */
  .ch-period { display: flex; align-items: center; gap: 8px; }
  .seg {
    flex: 1; display: inline-flex; padding: 4px; gap: 2px;
    background: var(--v-card-warm); border-radius: 999px; height: 36px;
  }
  .seg__item {
    flex: 1; display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 13px;
    color: var(--v-fg-muted); border-radius: 999px; cursor: pointer;
  }
  .seg__item.on { background: var(--v-white); color: var(--v-fg);
                  box-shadow: 0 1px 2px rgba(26,24,21,0.06); }
  .ch-type-btn {
    width: 36px; height: 36px; border-radius: 999px; flex-shrink: 0;
    background: var(--v-card-warm); color: var(--v-fg);
    border: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ch-type-btn.on { background: var(--v-fg); color: var(--v-white); }
  .ch-type-btn svg { width: 18px; height: 18px; }

  /* Stat tiles (white) */
  .ch-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ch-stat {
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .ch-stat-lbl { font-weight: 700; font-size: 13px; color: var(--v-fg); }
  .ch-stat-val { font-weight: 700; font-size: 22px; color: var(--v-fg);
                 font-feature-settings: "tnum" on, "lnum" on;
                 line-height: 1.1; letter-spacing: -0.01em; }
  .ch-stat-var { font-weight: 600; font-size: 13px;
                 font-feature-settings: "tnum" on; }
  .ch-stat-var--up { color: var(--v-green); }

  /* Key/value rows */
  .ch-kv { display: flex; flex-direction: column; gap: 16px; padding-top: 4px; }
  .ch-kv-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .ch-kv-lbl { display: inline-flex; align-items: center; gap: 8px;
               font-family: var(--v-font-ui); font-weight: 700; font-size: 15px;
               color: var(--v-fg); }
  .ch-kv-dot {
    width: 10px; height: 10px; background: var(--v-fg-muted);
    transform: rotate(45deg); flex-shrink: 0;
  }
  .ch-kv-val { font-family: var(--v-font-ui); font-size: 15px; color: var(--v-fg-light);
               font-feature-settings: "tnum" on; }
  .ch-desc { font-family: var(--v-font-ui); font-size: 14px; line-height: 1.5;
             color: var(--v-fg-light); margin: 0; }

  /* Candle chart variant — body colours */
  .ch-canvas--candles .g { stroke: var(--v-green); fill: var(--v-green); }
  .ch-canvas--candles .r { stroke: var(--v-error); fill: var(--v-error); }
</style></head>
