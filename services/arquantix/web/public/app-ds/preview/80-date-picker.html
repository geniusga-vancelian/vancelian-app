<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 28px;
         align-items: center; min-height: 100vh; }

  /* ============================================================
     Date picker — monthly calendar + range select
       .cal              — frame (white, 12 padding)
       .cal__head        — month name + prev/next ic-btn
       .cal__weekdays    — 7-col header (DOW)
       .cal__grid        — 7-col grid of .cal__day
       .cal__day.is-today  — anthracite border
       .cal__day.is-on     — selected (anthracite fill)
       .cal__day.is-in-range — between two range endpoints
       .cal__day.is-other  — outside current month (muted)
       .cal__day.is-dot    — has event/transaction (small dot below)
     ============================================================ */
  .cal {
    width: 360px; max-width: 100%;
    background: var(--v-white); border-radius: 16px;
    border: 1px solid var(--v-fg-10);
    padding: 20px 18px; display: flex; flex-direction: column; gap: 14px;
  }
  .cal__head { display: flex; align-items: center; gap: 12px; }
  .cal__month { flex: 1; font-weight: 700; font-size: 16px; color: var(--v-fg);
                text-transform: capitalize; }
  .ic-btn-sm {
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--v-card-warm); color: var(--v-fg);
    border: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ic-btn-sm:hover { background: var(--v-fg-10); }
  .ic-btn-sm svg { width: 16px; height: 16px; }

  .cal__weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; font-size: 11px; font-weight: 600;
    color: var(--v-fg-light); text-transform: uppercase;
    letter-spacing: 0.04em; text-align: center;
  }
  .cal__weekdays span { padding: 4px 0; }

  .cal__grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal__day {
    height: 40px; border-radius: 999px;
    background: transparent; border: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--v-font-ui); font-weight: 500; font-size: 14px;
    color: var(--v-fg); font-feature-settings: "tnum" on, "lnum" on;
    position: relative;
  }
  .cal__day:hover { background: var(--v-fg-05); }
  .cal__day.is-other { color: var(--v-fg-20); }
  .cal__day.is-today { box-shadow: inset 0 0 0 1.5px var(--v-fg); }
  .cal__day.is-on    { background: var(--v-fg); color: var(--v-white); }
  .cal__day.is-on:hover { background: var(--v-fg-body); }
  .cal__day.is-in-range {
    background: var(--v-fg-05); border-radius: 0;
    color: var(--v-fg);
  }
  .cal__day.is-range-start { border-radius: 999px 0 0 999px;
                              background: var(--v-fg); color: var(--v-white); }
  .cal__day.is-range-end   { border-radius: 0 999px 999px 0;
                              background: var(--v-fg); color: var(--v-white); }
  .cal__day.is-dot::after {
    content: ""; position: absolute; bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 999px;
    background: var(--v-terracotta);
  }
  .cal__day.is-disabled { color: var(--v-fg-20); cursor: not-allowed; }

  .cal__foot { display: flex; gap: 8px; margin-top: 4px; }
  .cal__foot .btn { flex: 1; }

  /* Range summary block */
  .cal__range {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: var(--v-card-warm); border-radius: 8px;
  }
  .cal__range__col { display: flex; flex-direction: column; gap: 2px; }
  .cal__range__lbl { font-size: 11px; color: var(--v-fg-muted);
                     text-transform: uppercase; letter-spacing: 0.06em; }
  .cal__range__val { font-weight: 700; font-size: 14px; color: var(--v-fg);
                     font-feature-settings: "tnum" on; }
  .cal__range__arrow { color: var(--v-fg-light); }
</style></head>

    <div class="cal__grid">
