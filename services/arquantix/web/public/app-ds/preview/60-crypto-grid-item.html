<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 24px;
         align-items: center; justify-content: center; min-height: 100vh; }

  /* ============================================================
     Crypto grid item — small square tile used in 4-up rows
     ("Popular crypto currencies").
     Anatomy: rounded-square icon (real logo or letter) + ticker
     + signed % variation underneath.
     ============================================================ */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
          width: 520px; max-width: 100%; }

  .ct {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer;
  }
  .ct__icon {
    width: 64px; height: 64px; border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(26,24,21,0.06);
    margin-bottom: 4px; /* slightly more breathing room from icon to text */
  }
  .ct__icon img { width: 100%; height: 100%; display: block; }
  .ct__ticker {
    font-family: var(--v-font-ui); font-weight: 700; font-size: 15px;
    color: var(--v-fg); letter-spacing: 0.02em; line-height: 1.1;
  }
  .ct__var {
    display: inline-flex; align-items: center; gap: 3px;
    font-family: var(--v-font-ui); font-weight: 600; font-size: 12px;
    font-feature-settings: "tnum" on;
    line-height: 1.1;
  }
  .ct__var--up   { color: var(--v-green); }
  .ct__var--dn   { color: var(--v-error); }
  .ct__var--flat { color: var(--v-fg-light); }
  .ct__var svg { width: 10px; height: 10px; }
</style></head>
<body>
  <div class="grid">
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/btc.svg" alt="BTC"/></div>
      <div class="ct__ticker">BTC</div>
      <div class="ct__var ct__var--up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        2,40&nbsp;%
      </div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/eth.svg" alt="ETH"/></div>
      <div class="ct__ticker">ETH</div>
      <div class="ct__var ct__var--dn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        1,80&nbsp;%
      </div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/sol.svg" alt="SOL"/></div>
      <div class="ct__ticker">SOL</div>
      <div class="ct__var ct__var--up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        4,12&nbsp;%
      </div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/usdc.svg" alt="USDC"/></div>
      <div class="ct__ticker">USDC</div>
      <div class="ct__var ct__var--flat">0,00&nbsp;%</div>
    </div>
  </div>

  <div class="grid">
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/avax.svg" alt="AVAX"/></div>
      <div class="ct__ticker">AVAX</div>
      <div class="ct__var ct__var--up">+ 3,2&nbsp;%</div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/link.svg" alt="LINK"/></div>
      <div class="ct__ticker">LINK</div>
      <div class="ct__var ct__var--up">+ 1,1&nbsp;%</div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/dot.svg" alt="DOT"/></div>
      <div class="ct__ticker">DOT</div>
      <div class="ct__var ct__var--dn">– 2,3&nbsp;%</div>
    </div>
    <div class="ct">
      <div class="ct__icon"><img src="/app-ds/crypto/ada.svg" alt="ADA"/></div>
      <div class="ct__ticker">ADA</div>
      <div class="ct__var ct__var--up">+ 0,9&nbsp;%</div>
    </div>
  </div>
</body></html>
