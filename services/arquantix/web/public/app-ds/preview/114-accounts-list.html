<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/components/icon/icon.css"/>
<link rel="stylesheet" href="/app-ds/components/accounts-list/accounts-list.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}

</style></head><body><div class="stage"><p class="lbl">Accounts list · .v-card--list</p>
<div class="v-card v-card--list" style="max-width:480px;">
  <button type="button" class="acc-row">
    <span class="avt avt--green" style="--avt-size:40px"><span class="ic" style="width:20px;height:20px;-webkit-mask-image:url('/icons/kalai/bitcoin.svg');mask-image:url('/icons/kalai/bitcoin.svg');"></span></span>
    <span class="acc-row__body">
      <span class="acc-row__title v-body-strong">Bitcoin</span>
      <span class="acc-row__sub v-body-sm">0,42 BTC</span>
    </span>
    <span class="acc-row__right">
      <span class="v-amount-md">18 420,00 €</span>
      <span class="acc-row__daily">+ 12,40 € / jour</span>
    </span>
    <span class="ic" style="width:18px;height:18px;color:var(--v-fg-20);-webkit-mask-image:url('/icons/kalai/chevron-right.svg');mask-image:url('/icons/kalai/chevron-right.svg');"></span>
  </button>
  <hr class="hr-thin"/>
  <button type="button" class="acc-row acc-row--pending">
    <span class="avt avt--blue" style="--avt-size:40px"><span class="ic" style="width:20px;height:20px;-webkit-mask-image:url('/icons/kalai/payment-card.svg');mask-image:url('/icons/kalai/payment-card.svg');"></span></span>
    <span class="acc-row__body">
      <span class="acc-row__title v-body-strong">Compte euro</span>
      <span class="acc-row__sub v-body-sm">Ouverture en cours</span>
      <span class="acc-row__progress"><span class="acc-row__progress-track"><span class="acc-row__progress-fill" style="width:60%"></span></span><span class="acc-row__progress-lbl">Étape <b>3</b> sur 5</span></span>
    </span>
    <span class="acc-row__cta">Continuer <span class="ic" style="width:14px;height:14px;-webkit-mask-image:url('/icons/kalai/chevron-right.svg');mask-image:url('/icons/kalai/chevron-right.svg');"></span></span>
  </button>
</div>
</div></body></html>
