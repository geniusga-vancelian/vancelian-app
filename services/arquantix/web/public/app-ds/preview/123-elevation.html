<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Élévations · Webapp4</p>
<div class="pv-canvas pv-canvas--white" style="background:var(--v-bg)">
      <p class="pv-caption" style="margin:0">3 niveaux, et rien d'autre. La marque ne flotte pas.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:24px;width:100%">
        
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="width:100%;height:100px;background:#fff;border-radius:8px;box-shadow:none;border:1px solid rgba(26,24,21,0.04)"></div>
          <div>
            <div class="pv-token__name">--v-elev-flat</div>
            <div class="pv-token__hex">Listes plates, cartes inline</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="width:100%;height:100px;background:#fff;border-radius:8px;box-shadow:0 2px 6px 0 rgba(26,24,21,.07);border:1px solid rgba(26,24,21,0.04)"></div>
          <div>
            <div class="pv-token__name">--v-elev-subtle</div>
            <div class="pv-token__hex">Cartes interactives au repos</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="width:100%;height:100px;background:#fff;border-radius:8px;box-shadow:0 8px 24px 0 rgba(26,24,21,.10);border:1px solid rgba(26,24,21,0.04)"></div>
          <div>
            <div class="pv-token__name">--v-elev-medium</div>
            <div class="pv-token__hex">Modals, popovers, drawers</div>
          </div>
        </div>
      </div>
    </div>
</div></body></html>
