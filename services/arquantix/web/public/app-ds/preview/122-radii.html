<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Rayons · Webapp4</p>
<p class="pv-caption" style="margin:0">5 paliers stricts. L'app ne dépasse jamais 12 px sauf pill.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:16px;width:100%">
        
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:4px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-tag</div>
            <div class="pv-token__hex">4 px</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:6px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-input</div>
            <div class="pv-token__hex">6 px</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:8px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-card</div>
            <div class="pv-token__hex">8 px</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:12px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-modal</div>
            <div class="pv-token__hex">12 px</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:24px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-sheet</div>
            <div class="pv-token__hex">24 px</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
          <div style="width:100%;height:80px;background:#fff;border:1px solid var(--v-fg-10);border-radius:999px"></div>
          <div style="text-align:center">
            <div class="pv-token__name">--v-radius-pill</div>
            <div class="pv-token__hex">9999 px (pill)</div>
          </div>
        </div>
      </div>
</div></body></html>
