<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">News Section · Webapp4</p>
<div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:16px;width:100%">
        <article class="actu">
          <div class="actu__img" style="background:linear-gradient(135deg, #C0512E 0%, #8A2C1A 100%);"></div>
          <p class="actu__title" style="padding:14px">L'immobilier tokenisé passe le cap des 100 M€ en Europe</p>
          <span class="actu__meta">12 mars 2026 · 4 min</span>
        </article>
        <article class="actu">
          <div class="actu__img" style="background:linear-gradient(135deg, #33614D 0%, #1F3D2F 100%);"></div>
          <p class="actu__title" style="padding:14px">Niseko · Pourquoi la station japonaise attire les family offices</p>
          <span class="actu__meta">8 mars 2026 · 6 min</span>
        </article>
        <article class="actu">
          <div class="actu__img" style="background:linear-gradient(135deg, #0F2A47 0%, #08182C 100%);"></div>
          <p class="actu__title" style="padding:14px">Cadre réglementaire MiCA : ce qui change en 2026</p>
          <span class="actu__meta">5 mars 2026 · 8 min</span>
        </article>
      </div>
</div></body></html>
