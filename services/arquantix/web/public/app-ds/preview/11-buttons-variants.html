<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); display: flex; flex-direction: column; gap: 16px; align-items: flex-start; justify-content: center; min-height: 100vh; }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 20px; font-size: 14px; font-weight: 500; border-radius: 999px; border: 0; cursor: pointer; background: none; white-space: nowrap; line-height: 1; }
  .btn.icon-only { padding: 0; width: 40px; justify-content: center; }
  .pri { background: #1A1815; color: var(--v-white); }
  .sec { background: transparent; color: #1A1815; border: 1px solid #1A1815; }
  .ghost { background: transparent; color: #1A1815; }
  .link { background: transparent; color: #C0512E; padding: 0; height: auto; }
  .destr { background: #B83A3A; color: var(--v-white); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--v-fg-light); }
  svg { display: block; flex-shrink: 0; }
</style></head>
<body>
  <div class="lbl">Variants</div>
  <div class="row">
    <button class="btn pri">Primary</button>
    <button class="btn sec">Secondary</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn link">Mot de passe oublié</button>
    <button class="btn destr">Destructive</button>
  </div>
  <div class="lbl" style="margin-top: 4px">With icon</div>
  <div class="row">
    <button class="btn pri"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Investir</button>
    <button class="btn pri">Continuer<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <button class="btn sec"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Télécharger le PDF</button>
    <button class="btn ghost"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M6 12h12M10 18h4"/></svg>Filtrer</button>
    <button class="btn ghost icon-only"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
  </div>
</body></html>
