<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 18px;
         align-items: stretch; justify-content: center; min-height: 100vh;
         max-width: 540px; margin: 0 auto; }

  /* ============================================================
     Prompt suggestion cards — 2-line variant of suggestion chips.
     Bigger surface, primary line + helper line, scrollable row.
     Used by AI Writing / Voice on empty composer state.
     ============================================================ */
  .ps {
    display: flex; gap: 12px;
    overflow-x: auto;
    padding: 4px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .ps::-webkit-scrollbar { display: none; }

  .ps__card {
    flex: 0 0 auto;
    min-width: 200px;
    background: var(--v-card-warm);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 2px;
    text-align: left;
    border: 0; cursor: pointer;
    transition: background 120ms var(--v-ease-out);
  }
  .ps__card:hover { background: #EBE4DA; }

  .ps__card--outline {
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
  }
  .ps__card--outline:hover { background: var(--v-fg-05); }

  .ps__card__title {
    font-family: var(--v-font-ui); font-weight: 700; font-size: 15px;
    color: var(--v-fg); line-height: 1.25;
  }
  .ps__card__sub {
    font-family: var(--v-font-ui); font-weight: 400; font-size: 14px;
    color: var(--v-fg-light); line-height: 1.3;
  }

  /* Brand splash variant — Vancelian icon in a small dark pill */
  .ps__brand {
    flex: 0 0 auto;
    width: 56px; height: 56px;
    border-radius: 999px;
    background: var(--v-fg);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ps__brand::before {
    content: ""; width: 26px; height: 26px;
    background: var(--v-white);
    -webkit-mask: url("/brand/vancelian/logo-black-icon.svg") center/contain no-repeat;
            mask: url("/brand/vancelian/logo-black-icon.svg") center/contain no-repeat;
  }

  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
         font-weight: 500; color: var(--v-fg-light); margin: 12px 0 -10px; }
</style></head>
<body>

  <p class="lbl">2-line prompt cards · warm fill</p>
  <div class="ps">
    <button class="ps__card">
      <div class="ps__card__title">Create a portfolio</div>
      <div class="ps__card__sub">for long term goal</div>
    </button>
    <button class="ps__card">
      <div class="ps__card__title">Lorem ipsum</div>
      <div class="ps__card__sub">Dolor it</div>
    </button>
    <button class="ps__card">
      <div class="ps__card__title">Lorem ipsum</div>
      <div class="ps__card__sub">Dolor it</div>
    </button>
  </div>

  <p class="lbl">Outline variant · sur surface warm</p>
  <div class="ps" style="background:var(--v-card-warm);border-radius:16px;padding:12px">
    <button class="ps__card ps__card--outline">
      <div class="ps__card__title">Investir 50 €</div>
      <div class="ps__card__sub">Plus prudent</div>
    </button>
    <button class="ps__card ps__card--outline">
      <div class="ps__card__title">Voir mes objectifs</div>
      <div class="ps__card__sub">5 ans</div>
    </button>
    <button class="ps__card ps__card--outline">
      <div class="ps__card__title">Repartir à zéro</div>
      <div class="ps__card__sub">Recommencer le bilan</div>
    </button>
  </div>

  <p class="lbl">Brand splash · circle with Vancelian asterisk (empty state)</p>
  <div style="display:flex;justify-content:center;padding:32px 0">
    <span class="ps__brand" style="width:64px;height:64px"></span>
  </div>

</body></html>
