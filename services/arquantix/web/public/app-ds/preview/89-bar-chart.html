<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg);
         font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; flex-direction: column; gap: 32px;
         align-items: center; min-height: 100vh; max-width: 460px; margin: 0 auto; }

  /* ============================================================
     Bar chart — daily gains
     -----------------------------------------------------------
     Reuses 66-chart-module shell : .ch-card / .ch-meta / .ch-canvas
                                    .ch-period (seg)
     -----------------------------------------------------------
     3 vues partagent le même cadre : semaine (7 barres),
     mois (31 barres fines), année (12 barres mensuelles).
     Les gains journaliers étant très réguliers, les hauteurs
     varient très peu — la base de la barre est légèrement
     surélevée pour montrer une variation lisible.
     ============================================================ */
  .ch-card {
    width: 100%;
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
    border-radius: 16px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* Meta — same as 66 */
  .ch-meta {
    background: var(--v-white);
    border: 1px solid var(--v-fg-10);
    border-radius: 14px;
    padding: 2px; gap: 2px;
    display: flex; align-items: stretch;
    min-height: 68px;
  }
  .ch-meta__avt {
    width: 64px; flex-shrink: 0; align-self: stretch;
    border-radius: 12px;
    background: var(--v-green-bg); color: var(--v-green);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ch-meta__avt::before {
    content: ""; width: 28px; height: 28px; background: currentColor;
    -webkit-mask: url("/icons/kalai/trending-up.svg") center/contain no-repeat;
            mask: url("/icons/kalai/trending-up.svg") center/contain no-repeat;
  }
  .ch-meta__body {
    flex: 1; min-width: 0; padding: 10px 0 10px 14px;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
  }
  .ch-meta__lbl   { font-size: 12px; color: var(--v-fg-light); }
  .ch-meta__price {
    font-weight: 700; font-size: 22px;
    line-height: 1.1; color: var(--v-fg);
    font-feature-settings: "tnum" on, "lnum" on;
  }
  .ch-meta__var {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px;
    color: var(--v-green);
    font-feature-settings: "tnum" on;
  }
  .ch-meta__sep { width: 1px; height: 12px; background: var(--v-fg-10); }

  /* Canvas */
  .ch-canvas { position: relative; width: 100%; aspect-ratio: 320 / 160; }
  .ch-canvas svg { display: block; width: 100%; height: 100%; }
  .ch-grid { stroke: var(--v-fg-10); stroke-width: 1; }

  /* Bars — green, rounded top corners */
  .ch-bar {
    fill: var(--v-green);
    opacity: 0.25;
    transition: opacity 160ms var(--v-ease-out);
  }
  .ch-bar.is-active { opacity: 1; }

  /* Selected band — vertical strip behind active bar */
  .ch-bar-sel { fill: var(--v-fg); opacity: 0.04; }

  /* Active value tooltip (sits on top of selected bar) */
  .ch-tip {
    position: absolute; transform: translate(-50%, calc(-100% - 8px));
    background: var(--v-fg); color: var(--v-white);
    padding: 6px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    font-feature-settings: "tnum" on;
    box-shadow: 0 4px 14px rgba(26,24,21,0.18);
    line-height: 1;
  }
  .ch-tip::after {
    content: ""; position: absolute; left: 50%; top: 100%;
    transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: var(--v-fg);
  }

  /* X-axis labels — grid aligned to bar centres */
  .ch-x {
    display: grid;
    padding: 4px 0 0;
    font-size: 10px; color: var(--v-fg-light);
    font-feature-settings: "tnum" on;
    letter-spacing: 0.02em;
    text-align: center;
  }
  .ch-x--7  { grid-template-columns: repeat(7, 1fr); }
  .ch-x--12 { grid-template-columns: repeat(12, 1fr); }
  .ch-x--31 { grid-template-columns: repeat(31, 1fr); }
  /* Month view : only labels at days 1 / 8 / 15 / 22 / 31 */
  .ch-x--31 > span:nth-child(1) { grid-column: 1; }
  .ch-x--31 > span:nth-child(2) { grid-column: 8; }
  .ch-x--31 > span:nth-child(3) { grid-column: 15; }
  .ch-x--31 > span:nth-child(4) { grid-column: 22; }
  .ch-x--31 > span:nth-child(5) { grid-column: 31; }

  /* Period segmented control */
  .ch-period { display: flex; align-items: center; gap: 8px; }
  .ch-period .seg { flex: 1; }
  .ch-period .seg__item { flex: 1; padding: 0; }
</style></head>
<body>

  <!-- ====================================================
       View · WEEK (7 bars · daily)
       ==================================================== -->
  <p class="v-eyebrow--sm">Vue semaine · 7 jours · barres larges</p>
  <div class="ch-card">

    <div class="ch-canvas">

        <!-- 7 bars · slot 45.7 wide, body 28 wide centered.
             Heights vary tiny — baseline 50% of canvas, +/- 8px max -->

        <rect class="ch-bar" x="54.57"  y="44" width="28" height="116" rx="3"/>

        <rect class="ch-bar" x="283.14" y="44" width="28" height="116" rx="3"/>
      </svg>
      <span class="ch-tip" style="left:50%;top:26%">+&nbsp;1,82&nbsp;€</span>
    </div>

    <div class="ch-x ch-x--7">
      <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
    </div>

    <div class="ch-period">
      <div class="seg">
        <button class="seg__item is-on">Semaine</button>
        <button class="seg__item">Mois</button>
        <button class="seg__item">Année</button>
      </div>
    </div>
  </div>
