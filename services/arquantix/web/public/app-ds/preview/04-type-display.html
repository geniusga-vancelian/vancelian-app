<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); color: var(--v-fg); }
  .pair { display: grid; grid-template-columns: 110px 1fr 80px; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--v-fg-10); }
  .pair:last-child { border-bottom: 0; }
  .role { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--v-fg-muted); }
  .spec { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--v-fg-muted); text-align: right; }
</style></head>
<body>
  <div class="pair">
    <span class="role">Display</span>
    <span style="font-family:var(--v-font-display);font-weight:300;font-size:32px;line-height:1">Bâtir son patrimoine.</span>
    <span class="spec">Newsreader 32</span>
  </div>
  <div class="pair">
    <span class="role">Section</span>
    <span style="font-weight:600;font-size:22px">Vos investissements</span>
    <span class="spec">Inter 22 / 600</span>
  </div>
  <div class="pair">
    <span class="role">Title</span>
    <span style="font-weight:600;font-size:18px">Résidence Niseko — phase II</span>
    <span class="spec">Inter 18 / 600</span>
  </div>
</body></html>
