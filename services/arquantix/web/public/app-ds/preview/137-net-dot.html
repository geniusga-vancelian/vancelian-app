<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Network Dot · Webapp4</p>
<div class="pv-row" style="align-items:center">
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--base"></span>Base</span>
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--eth"></span>Ethereum</span>
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--sol"></span>Solana</span>
      </div>
      <div class="pv-row" style="align-items:center;margin-top:16px">
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--lg net-dot--base"></span>Base · large</span>
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--lg net-dot--eth"></span>Ethereum · large</span>
        <span style="display:inline-flex;align-items:center;gap:8px"><span class="net-dot net-dot--lg net-dot--sol"></span>Solana · large</span>
      </div>
</div></body></html>
