<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Avatar Exchange · Webapp4</p>
<div class="pv-row" style="align-items:flex-end;gap:24px">
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
          <span class="avt-x avt-x--40">
            <span class="avt-x__source"><img src="/app-ds/assets/crypto/eur.svg" alt="" onerror="this.parentElement.style.background='#fff';this.style.display='none'" /></span>
            <span class="avt-x__result"><img src="/app-ds/assets/crypto/btc.svg" alt="" /></span>
          </span>
          <span class="pv-token__meta">40 px</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
          <span class="avt-x avt-x--52">
            <span class="avt-x__source" style="background:var(--v-card-warm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">€</span>
            <span class="avt-x__result"><img src="/app-ds/assets/crypto/btc.svg" alt="" /></span>
          </span>
          <span class="pv-token__meta">52 px (default)</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
          <span class="avt-x avt-x--72">
            <span class="avt-x__source" style="background:var(--v-card-warm);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600">€</span>
            <span class="avt-x__result"><img src="/app-ds/assets/crypto/btc.svg" alt="" /></span>
          </span>
          <span class="pv-token__meta">72 px</span>
        </div>
      </div>
</div></body></html>
