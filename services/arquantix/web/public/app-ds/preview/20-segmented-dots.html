<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); color: var(--v-fg);
         display:flex; flex-direction:column; gap: 18px; align-items: center; justify-content:center; min-height: 100vh; }
  .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--v-fg-light); font-weight: 500; }

  .seg { display:inline-flex; padding:4px; gap:4px; background:#F3EDE6; border-radius:999px; }
  .seg__i { display:inline-flex; align-items:center; font-weight:500; color: var(--v-fg-muted);
            border-radius: 999px; }
  .seg__i.on { background:var(--v-white); color: var(--v-fg); box-shadow: 0 1px 2px rgba(26,24,21,0.06); }

  /* Regular — h36 / 13px / padding 14 */
  .seg--md { height: 36px; }
  .seg--md .seg__i { padding: 0 14px; font-size: 13px; }

  /* Small variant — h28 / 12px / padding 10 */
  .seg--sm { height: 28px; padding: 3px; gap: 3px; }
  .seg--sm .seg__i { padding: 0 10px; font-size: 12px; }

  .dots { display:inline-flex; align-items:center; gap:6px; }
  .dots span { width:6px; height:6px; border-radius:999px; background:var(--v-input-border); transition: width 200ms; }
  .dots span.on { width:24px; background:#1A1815; }
</style></head>
<body>
  <div class="lbl">Segmented · regular (h36)</div>
  <div class="seg seg--md"><div class="seg__i on">Actifs</div><div class="seg__i">Transactions</div><div class="seg__i">Documents</div></div>
  <div class="seg seg--md"><div class="seg__i">1S</div><div class="seg__i">1M</div><div class="seg__i on">1A</div><div class="seg__i">Tout</div></div>

  <div class="lbl" style="margin-top: 8px">Segmented · small (h28)</div>
  <div class="seg seg--sm"><div class="seg__i on">Actifs</div><div class="seg__i">Transactions</div><div class="seg__i">Documents</div></div>
  <div class="seg seg--sm"><div class="seg__i">1S</div><div class="seg__i">1M</div><div class="seg__i on">1A</div><div class="seg__i">Tout</div></div>

  <div class="lbl" style="margin-top: 8px">Pagination dots</div>
  <div class="dots"><span class="on"></span><span></span><span></span><span></span><span></span></div>
</body></html>
