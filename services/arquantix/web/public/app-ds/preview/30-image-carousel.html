<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); color: var(--v-fg);
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .carousel {
    position: relative; width: 560px; max-width: 100%;
    aspect-ratio: 16 / 9; border-radius: 16px; overflow: hidden;
    background: #C9D1DD; /* light blue-gray placeholder */
    display: flex; align-items: center; justify-content: center;
  }
  /* Progress segments — Stories-style, top of the image */
  .carousel__progress {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; gap: 6px; height: 3px;
    z-index: 2;
  }
  .carousel__progress span {
    flex: 1; height: 100%; border-radius: 999px;
    background: rgba(255,255,255,0.45);
  }
  .carousel__progress span.on { background: var(--v-white); }
  /* If you want the first slice to look "playing" (partial fill), use .playing */
  .carousel__progress span.playing {
    background: linear-gradient(to right, var(--v-white) 65%, rgba(255,255,255,0.45) 65%);
  }

  .carousel__icon {
    width: 80px; height: 80px;
    color: var(--v-white); opacity: 0.95;
  }
  .carousel__icon svg { width: 100%; height: 100%; }
</style></head>
<body>
  <div class="carousel">
    <div class="carousel__progress">
      <span class="on"></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="carousel__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="M21 17l-5-5-9 9"/>
      </svg>
    </div>
  </div>
</body></html>
