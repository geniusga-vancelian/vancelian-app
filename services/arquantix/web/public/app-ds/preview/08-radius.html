<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--v-bg); font-family: var(--v-font-ui); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 60px; height: 60px; background: #F3EDE6; }
  .nm { font-weight: 500; font-size: 12px; color: var(--v-fg); }
  .v { font-size: 11px; color: var(--v-fg-muted); font-feature-settings: "tnum" on; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="nm">none</div><div class="v">0px</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">tag</div><div class="v">4px</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="nm">input</div><div class="v">6px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">card</div><div class="v">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="nm">modal</div><div class="v">12px</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="nm">sheet</div><div class="v">24px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="nm">pill</div><div class="v">9999</div></div>
</div>
</body></html>
