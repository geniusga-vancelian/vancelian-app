<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/components/icon/icon.css"/>
<link rel="stylesheet" href="/app-ds/components/news-section/news-section.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}

</style></head><body><div class="stage"><p class="lbl">News section · grille actu</p>
<div class="news-grid" style="max-width:560px;">
  <button type="button" class="actu">
    <div class="actu__img" style="background:linear-gradient(135deg,#33614D,#0F2A47);">
      <span class="cchip actu__cat"><span class="cdot" style="background:var(--v-green)"></span>Patrimoine</span>
    </div>
    <h3 class="actu__title">Comment diversifier en 2026 sans sacrifier la liquidité</h3>
    <div class="actu__meta"><span class="ic" style="width:14px;height:14px;-webkit-mask-image:url('/icons/kalai/info.svg');mask-image:url('/icons/kalai/info.svg');"></span> 4 min</div>
  </button>
  <button type="button" class="actu">
    <div class="actu__img" style="background:linear-gradient(135deg,#C0512E,#141208);">
      <span class="cchip actu__cat"><span class="cdot"></span>Marchés</span>
    </div>
    <h3 class="actu__title">Bitcoin : lire les cycles sans sur-réagir</h3>
    <div class="actu__meta"><span class="ic" style="width:14px;height:14px;-webkit-mask-image:url('/icons/kalai/info.svg');mask-image:url('/icons/kalai/info.svg');"></span> 6 min</div>
  </button>
</div>
</div></body></html>
