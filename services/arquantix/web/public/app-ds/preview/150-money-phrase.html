<!doctype html>
<html lang="fr"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/app-ds/colors_and_type.css"/>
<link rel="stylesheet" href="/app-ds/layout.css"/>
<style>
body{margin:0;padding:32px;background:var(--v-bg);font-family:var(--v-font-ui);color:var(--v-fg);min-height:100vh;}
.stage{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--v-fg-light);margin:0 0 12px;}
</style></head>
<body><div class="stage"><p class="lbl">Money Phrase · Webapp4</p>
<p style="font-family:var(--v-font-editorial);font-weight:300;font-size:19px;line-height:1.5;color:var(--v-fg-body);margin:0;letter-spacing:-0.005em">
        Vous gagnez aujourd'hui
        <span style="font-weight:500;color:var(--v-green);font-feature-settings:'tnum' on">24,60 €</span>
        de revenus.
      </p>
    </div>
    <div class="pv-canvas pv-canvas--warm">
      <p style="font-family:var(--v-font-editorial);font-weight:300;font-size:19px;line-height:1.5;color:var(--v-fg-body);margin:0;letter-spacing:-0.005em">
        Soit
        <span style="font-weight:500;color:var(--v-green);font-feature-settings:'tnum' on">+ 0,28 %</span>
        de plus qu'hier.
      </p>
</div></body></html>
